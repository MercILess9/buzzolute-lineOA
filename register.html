<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --line-green: #06c755; --navy: #1a2a6c; }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh; font-family: 'Kanit', sans-serif; padding: 30px 15px;
        }
        .reg-card { 
            max-width: 480px; margin: auto; background: #ffffff; 
            padding: 40px 25px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none;
        }
        .header-title { color: var(--navy); font-weight: 600; margin-bottom: 25px; }
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px; object-fit: cover;
        }
        .line-name { font-weight: 500; color: #333; font-size: 1.2rem; }
        .line-id { font-size: 0.85rem; color: #999; font-weight: 300; margin-bottom: 30px; }
        
        .form-label { font-weight: 500; color: #555; font-size: 0.9rem; margin-left: 2px; }
        .form-control, .form-select { 
            border-radius: 12px; padding: 12px 15px; border: 1px solid #e1e1e1;
            font-size: 1rem; transition: all 0.3s;
        }
        .form-control:focus { border-color: var(--line-green); box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.1); }
        .btn-submit { 
            background: var(--line-green); border: none; border-radius: 15px; 
            padding: 16px; font-weight: 600; font-size: 1.1rem; color: white;
            margin-top: 30px; width: 100%; transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.98); }
        #form-section { display: none; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div id="loader" class="text-center">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3 text-muted">กำลังเชื่อมต่อ LINE...</p>
        </div>

        <div id="form-section" class="text-center">
            <h3 class="header-title">ลงทะเบียน Buzzolute</h3>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" class="line-name">-</div>
            <div id="userIdDisplay" class="line-id">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" selected disabled>กรุณาเลือกจังหวัด</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">ประเทศ</label>
                        <input type="text" id="country" class="form-control" readonly style="background-color: #f8f9fa;">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 

                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                    document.getElementById('userIdDisplay').innerText = profile.userId;
                    document.getElementById('country').value = DEFAULT_COUNTRY;
                    
                    const provinceSelect = document.getElementById('province');
                    provinces.forEach(p => provinceSelect.add(new Option(p, p)));

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('form-section').style.display = 'block';
                }
            } catch (err) { console.error('LIFF Init Error:', err); }
        }

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const data = {
                nickname: document.getElementById('nickname').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value
            };

            if (Object.values(data).some(val => !val)) {
                return alert("กรุณากรอกข้อมูลให้ครบถ้วนทุกช่องครับ");
            }

            btn.disabled = true;
            btn.innerText = 'กำลังบันทึกข้อมูล...';

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                ...data,
                country: DEFAULT_COUNTRY,
                pin: DEFAULT_PIN
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });
                alert('ลงทะเบียนสำเร็จแล้ว ขอบคุณครับ!');
                liff.closeWindow();
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการบันทึก');
                btn.disabled = false;
                btn.innerText = 'ลงทะเบียน';
            }
        }
        initLIFF();
    </script>
</body>
</html>
