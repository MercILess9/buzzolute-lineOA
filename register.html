<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสมาชิก - Buzzolute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .input-focus:focus { border-color: #2563eb; ring: 2px; ring-color: #dbeafe; outline: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="registerCard" class="bg-white w-full max-w-md rounded-[2.5rem] shadow-xl border border-slate-100 p-8 md:p-10">
        
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-3xl shadow-lg shadow-blue-200 mb-4">
                🚀
            </div>
            <h1 class="text-2xl font-bold text-slate-800">ลงทะเบียนเข้าใช้งาน</h1>
            <p class="text-slate-400 text-sm mt-1">กรุณากรอกข้อมูลเพื่อเข้าดูเนื้อหาพิเศษ</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">ชื่อ-นามสกุล</label>
                <input type="text" id="userName" placeholder="เช่น นายสมชาย ใจดี" 
                       class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus transition-all">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="userPhone" placeholder="08x-xxx-xxxx" 
                       class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus transition-all">
            </div>

            <input type="hidden" id="userId">

            <button onclick="submitRegistration()" id="btnSubmit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2 mt-4">
                <span>บันทึกข้อมูล</span>
                <span id="loader" class="hidden animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
            </button>
        </div>

        <p class="text-center text-xs text-slate-300 mt-8 italic">
            ข้อมูลของคุณจะถูกเก็บเป็นความลับในระบบ Buzzolute
        </p>
    </div>

    <script src="config.js"></script>

    <script>
        // เริ่มการทำงาน LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;
                    
                    // (Optional) เช็คเบื้องต้นว่าถ้าลงทะเบียนแล้ว ให้เด้งไปหน้า Link15 เลย
                    checkExistingMember(profile.userId);
                }
            } catch (err) {
                console.error('LIFF Init Error', err);
            }
        }

        // เช็คว่าเคยลงทะเบียนหรือยัง (กัน User เข้าหน้า Register ซ้ำ)
        async function checkExistingMember(uid) {
            const response = await fetch(`${GAS_URL}?type=pack&userId=${uid}`);
            const result = await response.json();
            if (result.error !== "NOT_MEMBER") {
                // ถ้าเป็นสมาชิกอยู่แล้ว ให้ไปหน้าดูวิดีโอทันที
                window.location.href = "link15.html";
            }
        }

        async function submitRegistration() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const userId = document.getElementById('userId').value;
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');

            if (!name || !phone) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ');
                return;
            }

            // แสดงสถานะกำลังโหลด
            btn.disabled = true;
            btn.classList.add('opacity-70');
            loader.classList.remove('hidden');

            try {
                // ส่งข้อมูลไปบันทึกที่ Google Sheets ผ่าน GAS (ใช้ POST)
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญสำหรับการส่งจากเว็บไป GAS
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        method: 'register',
                        userId: userId,
                        name: name,
                        phone: phone
                    })
                });

                // เนื่องจากโหมด no-cors เราจะไม่อ่าน Response แต่จะหน่วงเวลาแล้วเด้งไปหน้าถัดไป
                setTimeout(() => {
                    alert('ลงทะเบียนสำเร็จ! ยินดีต้อนรับครับ');
                    window.location.href = "link15.html"; // ลงทะเบียนเสร็จ ดีดไปหน้าวิดีโอ
                }, 1500);

            } catch (err) {
                console.error('Save Error', err);
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                loader.classList.add('hidden');
            }
        }

        initLiff();
    </script>
</body>
</html>
