<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --active-blue: #007bff; /* สีฟ้าที่คุณต้องการ */
            --navy: #1a2a6c; 
        }

        body { 
            background: #f0f2f5;
            min-height: 100vh; font-family: 'Kanit', sans-serif; 
        }

        /* --- Full Screen Loading --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s ease-in-out infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Card Design --- */
        .reg-card { 
            max-width: 480px; margin: 40px auto; background: #ffffff; 
            padding: 40px 25px; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: none; /* ซ่อนไว้ก่อนโหลดเสร็จ */
        }
        .header-title { color: var(--navy); font-weight: 600; margin-bottom: 25px; }

        /* --- Highlight ตอนพิมพ์สีฟ้า --- */
        .form-control:focus, .ts-wrapper.focus .ts-control { 
            border-color: var(--active-blue) !important; 
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25) !important;
            outline: none;
        }

        .profile-img { 
            width: 100px; height: 100px; border-radius: 50%; 
            margin-bottom: 15px; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-submit { 
            background: var(--active-blue); border: none; border-radius: 12px; 
            padding: 15px; font-weight: 600; color: white; width: 100%; margin-top: 25px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h4 style="letter-spacing: 2px;">CONNECTING LINE</h4>
        <p style="font-weight: 200; opacity: 0.8;">กรุณารอสักครู่...</p>
    </div>

    <div class="container">
        <div id="form-section" class="reg-card text-center">
            <h3 class="header-title">Register Buzzolute LINE</h3>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" style="font-weight: 500; font-size: 1.1rem;">-</div>
            <div id="userIdDisplay" style="font-size: 0.75rem; color: #bbb; margin-bottom: 25px;">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">จังหวัด (พิมพ์เพื่อค้นหา)</label>
                        <select id="province" class="form-select" placeholder="ค้นหาจังหวัด..."></select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 

                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                    document.getElementById('userIdDisplay').innerText = profile.userId;
                    
                    // --- Setup Searchable Province ---
                    const select = document.getElementById('province');
                    provinces.forEach(p => select.add(new Option(p, p)));
                    new TomSelect("#province", {
                        create: false,
                        sortField: { field: "text", order: "asc" }
                    });

                    // ปิด Loading และโชว์ Form
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('form-section').style.display = 'block';
                    }, 500);
                }
            } catch (err) { console.error(err); }
        }

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const data = {
                nickname: document.getElementById('nickname').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value
            };

            if (Object.values(data).some(v => !v)) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                ...data,
                country: DEFAULT_COUNTRY,
                pin: DEFAULT_PIN
            };

            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('ลงทะเบียนสำเร็จ!');
                liff.closeWindow();
            } catch (err) {
                alert('ผิดพลาด');
                btn.disabled = false;
            }
        }
        initLIFF();
    </script>
</body>
</html>
