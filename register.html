<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --active-blue: #007bff; 
            --navy: #1a2a6c; 
        }

        body { 
            background: #f8f9fa;
            min-height: 100vh; font-family: 'Kanit', sans-serif; 
        }

        /* --- 1. Full Screen Loading (White + Fast Spin) --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.4s ease;
        }
        .spinner {
            width: 60px; height: 60px; 
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--active-blue); 
            border-radius: 50%;
            /* ปรับความเร็วจาก 1s เป็น 0.6s ให้หมุนไวขึ้น */
            animation: spin 0.6s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader h4 { color: var(--navy); font-weight: 500; margin-bottom: 5px; }
        #loader p { color: #888; font-size: 0.9rem; }

        /* --- Card Design --- */
        .reg-card { 
            max-width: 480px; margin: 30px auto; background: #ffffff; 
            padding: 35px 25px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none;
        }

        /* --- Input Highlight Blue --- */
        .form-control:focus { 
            border-color: var(--active-blue); 
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.15);
        }

        /* --- 2. Custom Tom Select (Search & Scrollable) --- */
        .ts-wrapper.single .ts-control {
            border-radius: 12px; padding: 12px; border: 1px solid #dee2e6;
            font-size: 1rem; transition: all 0.3s;
        }
        /* ปรับแต่ง Dropdown ให้เลื่อนได้และสวยงาม */
        .ts-dropdown {
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #eee; margin-top: 8px; padding: 5px;
        }
        /* กำหนดความสูงและให้เลื่อนได้ (Scroll) */
        .ts-dropdown-content {
            max-height: 220px !important; 
            overflow-y: auto !important;
        }
        .ts-dropdown .option {
            padding: 10px 15px; border-radius: 8px; margin-bottom: 2px;
        }
        .ts-dropdown .active { 
            background-color: var(--active-blue) !important; 
            color: #fff !important; 
        }

        .profile-img { 
            width: 90px; height: 90px; border-radius: 50%; 
            margin-bottom: 15px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-submit { 
            background: var(--active-blue); border: none; border-radius: 15px; 
            padding: 16px; font-weight: 600; color: white; width: 100%; margin-top: 25px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h4>กำลังเชื่อมต่อระบบ LINE</h4>
        <p>โปรดรอสักครู่...</p>
    </div>

    <div class="container">
        <div id="form-section" class="reg-card text-center">
            <h3 style="color:var(--navy); font-weight:600; margin-bottom:25px;">Register Buzzolute LINE</h3>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" style="font-weight: 500; font-size: 1.1rem;">-</div>
            <div id="userIdDisplay" style="font-size: 0.7rem; color: #ccc; margin-bottom: 25px;">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select" placeholder="เลือกหรือพิมพ์ค้นหาจังหวัด..."></select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 

                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                    document.getElementById('userIdDisplay').innerText = profile.userId;
                    
                    // Setup จังหวัด Searchable & Scrollable
                    const select = document.getElementById('province');
                    provinces.forEach(p => select.add(new Option(p, p)));
                    
                    new TomSelect("#province", {
                        create: false,
                        maxOptions: 100,
                        placeholder: "พิมพ์ค้นหาจังหวัด...",
                        controlInput: '<input>', // มั่นใจว่ามีช่องพิมพ์ค้นหา
                        render: {
                            no_results: (data, escape) => '<div class="no-results">ไม่พบข้อมูลจังหวัด...</div>'
                        }
                    });

                    // ซ่อน Loading (Smooth Fade Out)
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        document.getElementById('form-section').style.display = 'block';
                    }, 400);
                }
            } catch (err) { console.error(err); }
        }

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const data = {
                nickname: document.getElementById('nickname').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value.trim()
            };

            if (Object.values(data).some(v => !v)) return alert("กรุณากรอกข้อมูลให้ครบถ้วนทุกช่องครับ");

            btn.disabled = true;
            btn.innerText = 'กำลังบันทึกข้อมูล...';

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                ...data,
                country: DEFAULT_COUNTRY,
                pin: DEFAULT_PIN
            };

            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert('ลงทะเบียนสำเร็จ ขอบคุณครับ!');
                liff.closeWindow();
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการบันทึก');
                btn.disabled = false;
                btn.innerText = 'ลงทะเบียน';
            }
        }
        initLIFF();
    </script>
</body>
</html>
