<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f3f4f6; }
        .form-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .loading-overlay { background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 50; }
    </style>
</head>
<body class="p-4">

    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600 mb-2"></div>
            <p class="text-gray-500">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8">
        <div class="form-card p-8">
            <div class="text-center mb-8">
                <img id="displayPic" class="w-24 h-24 rounded-full mx-auto border-4 border-blue-100 shadow-sm mb-4" src="https://via.placeholder.com/150">
                <h2 id="formTitle" class="text-2xl font-bold text-gray-800">จัดการข้อมูลสมาชิก</h2>
                <p id="lineName" class="text-gray-500 text-sm">LINE Name</p>
            </div>

            <form id="accountForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>

                <div id="pinSection" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ระดับสมาชิก (PIN)</label>
                    <select id="pin" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="General">General</option>
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                        <option value="Emerald">Emerald</option>
                        <option value="Diamond">Diamond</option>
                    </select>
                    <p class="text-xs text-gray-400 mt-1">* หากอัปเกรดระดับสูงขึ้น ระบบจะถามรหัสยืนยัน</p>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-lg transition duration-300 transform active:scale-95">
                    ลงทะเบียน
                </button>
            </form>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const WEB_APP_URL = "ใส่_WEB_APP_URL_ของคุณที่นี่"; // ⚠️ แก้ตรงนี้
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        
        let currentUser = {};
        let isUpdateMode = false;
        let oldPin = "General";

        async function initLIFF() {
            try {
                await liff.init({ liffId: "ใส่_LIFF_ID_ของคุณที่นี่" }); // ⚠️ แก้ตรงนี้
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    currentUser = {
                        userId: profile.userId,
                        lineName: profile.displayName,
                        pictureUrl: profile.pictureUrl
                    };
                    
                    // อัปเดต UI เบื้องต้น
                    document.getElementById('displayPic').src = profile.pictureUrl;
                    document.getElementById('lineName').innerText = profile.displayName;
                    
                    await checkAccountStatus();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
            }
        }

        async function checkAccountStatus() {
            const response = await fetch(`${WEB_APP_URL}?userId=${currentUser.userId}&type=account`);
            const res = await response.json();

            if (res.status === "REGISTERED") {
                isUpdateMode = true;
                oldPin = res.data.pin || "General";
                
                // เปลี่ยนหน้าตาฟอร์ม
                document.getElementById('formTitle').innerText = "แก้ไขข้อมูลสมาชิก";
                document.getElementById('submitBtn').innerText = "อัปเดตข้อมูล";
                document.getElementById('pinSection').classList.remove('hidden');
                
                // หยอดข้อมูลเดิม
                document.getElementById('fullName').value = res.data.fullName;
                document.getElementById('phone').value = res.data.phone;
                document.getElementById('pin').value = oldPin;
            }
            document.getElementById('loading').classList.add('hidden');
        }

        document.getElementById('accountForm').onsubmit = async (e) => {
            e.preventDefault();
            const newPin = document.getElementById('pin').value;
            let verifyCode = "";

            // --- Logic เช็คการอัปเกรด PIN ---
            if (isUpdateMode && pinRank.indexOf(newPin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({
                    title: 'ยืนยันการอัปเกรด',
                    text: `คุณกำลังขอเปลี่ยนเป็นระดับ ${newPin} กรุณาใส่ Code ยืนยัน`,
                    input: 'text',
                    inputPlaceholder: 'ใส่รหัสรหัสผ่านที่นี่...',
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });
                
                if (!code) return; // กดยกเลิก
                verifyCode = code;
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const payload = {
                userId: currentUser.userId,
                lineName: currentUser.lineName, // ใช้จาก LIFF ล่าสุด
                pictureUrl: currentUser.pictureUrl, // ใช้จาก LIFF ล่าสุด
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                pin: newPin,
                verifyCode: verifyCode
            };

            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });

            const result = await response.text();

            if (result === "Success" || result === "Updated") {
                await Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'ข้อมูลของคุณถูกบันทึกเรียบร้อยแล้ว', timer: 2000 });
                liff.closeWindow();
            } else if (result === "InvalidCode") {
                Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', text: 'กรุณาตรวจสอบรหัสอัปเกรดอีกครั้ง' });
            } else {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถบันทึกข้อมูลได้' });
            }
        };

        window.onload = initLIFF;
    </script>
</body>
</html>
