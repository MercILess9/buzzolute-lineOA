<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fcfcfc; }
        .active-pack { 
            background-color: #1a2a6c !important; 
            color: white !important; 
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.2);
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Loading Animation */
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px;
            background-color: #1a2a6c; color: #1a2a6c;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0;
        }
        .dot-flashing::before {
            left: -12px; width: 6px; height: 6px; border-radius: 5px;
            background-color: #1a2a6c; color: #1a2a6c;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 12px; width: 6px; height: 6px; border-radius: 5px;
            background-color: #1a2a6c; color: #1a2a6c;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: #1a2a6c; }
            50%, 100% { background-color: #ebebeb; }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="mb-6"><div class="dot-flashing"></div></div>
        <p class="text-sm font-light tracking-widest text-slate-400 uppercase">กำลังโหลดข้อมูล</p>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-700">
        
        <header class="sticky top-0 bg-white/80 backdrop-blur-lg z-50 border-b border-slate-100">
            <div class="max-w-md mx-auto px-4 py-4">
                <div class="flex overflow-x-auto gap-2 hide-scrollbar pb-1" id="packMenu">
                    </div>
            </div>
        </header>

        <main class="max-w-md mx-auto px-4 py-6">
            <div id="packHeader" class="mb-8">
                <h2 id="currentPackTitle" class="text-2xl font-semibold text-slate-900 mb-1">...</h2>
                <div id="playlistArea"></div>
            </div>

            <div id="videoList" class="space-y-4">
                </div>
        </main>
        
        <footer class="py-10 text-center">
            <p class="text-[10px] text-slate-300 tracking-widest uppercase">Buzzolute Line Official System</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};

        async function init() {
            try {
                // เช็คสมาชิกผ่าน auth.js
                const auth = await checkAuth();
                if (auth) {
                    MASTER_DATA = auth.data;
                    renderMenu();
                    
                    // เลือก Pack แรกมาแสดงเป็น Default
                    const firstPack = Object.keys(MASTER_DATA)[0];
                    if (firstPack) showPack(firstPack, 0);

                    // ปิดหน้าโหลด แสดงเนื้อหา
                    const loader = document.getElementById('loading');
                    const mainUI = document.getElementById('mainUI');
                    loader.classList.add('opacity-0');
                    setTimeout(() => {
                        loader.style.display = 'none';
                        mainUI.classList.remove('hidden');
                        setTimeout(() => mainUI.classList.add('opacity-100'), 50);
                    }, 500);
                }
            } catch (err) {
                console.error("Init Error:", err);
                alert("ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
            }
        }

        function renderMenu() {
            const menu = document.getElementById('packMenu');
            menu.innerHTML = '';
            const packNames = Object.keys(MASTER_DATA);
            
            packNames.forEach((name, index) => {
                const btn = document.createElement('button');
                btn.id = `btn-${index}`;
                btn.className = "px-5 py-2.5 bg-slate-50 border border-slate-100 rounded-full text-sm font-medium text-slate-500 flex-shrink-0 transition-all whitespace-nowrap";
                btn.innerText = name; 
                btn.onclick = () => showPack(name, index);
                menu.appendChild(btn);
            });
        }

        function showPack(name, index) {
            // สลับสถานะปุ่ม
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            document.getElementById(`btn-${index}`)?.classList.add('active-pack');

            const packInfo = MASTER_DATA[name];
            
            // อัปเดตหัวข้อ Pack
            document.getElementById('currentPackTitle').innerText = name;
            const playlistArea = document.getElementById('playlistArea');
            if (packInfo.playlistUrl) {
                playlistArea.innerHTML = `<a href="${packInfo.playlistUrl}" target="_blank" class="text-[11px] text-blue-500 hover:text-blue-700 transition-colors uppercase tracking-tight">Open Full Playlist on YouTube →</a>`;
            } else {
                playlistArea.innerHTML = '';
            }

            // แสดงรายการวิดีโอ (Thumbnail ซ้าย, Text ขวา)
            const listContainer = document.getElementById('videoList');
            listContainer.innerHTML = packInfo.videos.map(v => {
                const vid = v.url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#&?]*)/)?.[1];
                const thumb = vid ? `https://img.youtube.com/vi/${vid}/mqdefault.jpg` : 'https://via.placeholder.com/320x180';
                
                return `
                    <a href="${v.url}" target="_blank" class="flex items-center gap-4 group active:scale-[0.98] transition-transform">
                        <div class="relative flex-shrink-0 w-28 h-16 bg-slate-100 rounded-xl overflow-hidden shadow-sm border border-slate-50">
                            <img src="${thumb}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                        </div>
                        
                        <div class="flex flex-col min-w-0">
                            <div class="text-[15px] font-medium text-slate-800 line-clamp-1 mb-0.5 group-hover:text-blue-600 transition-colors">${v.title}</div>
                            <div class="text-[10px] text-slate-400 font-light truncate">${v.url}</div>
                        </div>
                    </a>
                    <div class="h-[1px] w-full bg-slate-50 my-1"></div>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
