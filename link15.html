<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Video Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        
        /* สไตล์ปุ่ม Pack ด้านบน */
        .pack-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }
        .active-pack {
            background: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }
        
        /* สไตล์ Video Card */
        .video-card {
            transition: all 0.2s;
        }
        .video-card:active { transform: scale(0.97); }
        
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12 text-gray-900">

    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-500 text-sm font-light">กำลังโหลดความรู้...</p>
    </div>

    <div id="mainUI" class="opacity-0 transition-opacity duration-500 hidden">
        
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-5 py-4 border-b flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-blue-700 to-blue-500 bg-clip-text text-transparent">
                <i class="fa-solid fa-play-circle mr-1"></i> Buzzolute Link
            </h1>
            <span id="userName" class="text-[12px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium"></span>
        </header>

        <div class="bg-white shadow-sm sticky top-[65px] z-30">
            <div class="px-5 pt-3">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-2">เลือกชุดวิดีโอที่คุณสนใจ</p>
            </div>
            <div class="flex gap-2 overflow-x-auto px-5 pb-4 custom-scrollbar" id="packMenu">
                </div>
        </div>

        <main class="p-5">
            <div id="packHeader" class="mb-6 bg-white p-5 rounded-3xl shadow-sm border border-white">
                <div class="flex items-start justify-between mb-4">
                    <h2 id="currentPackTitle" class="text-2xl font-extrabold text-gray-800 leading-tight"></h2>
                    <div class="flex gap-2">
                        <button onclick="copyCurrentLink()" class="w-10 h-10 flex items-center justify-center bg-gray-50 text-gray-400 rounded-2xl hover:bg-gray-100 transition-colors border border-gray-100">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                        <button onclick="shareToLine()" class="w-10 h-10 flex items-center justify-center bg-green-50 text-green-600 rounded-2xl hover:bg-green-100 transition-colors border border-green-100">
                            <i class="fa-solid fa-share-nodes"></i>
                        </button>
                    </div>
                </div>
                
                <a id="playlistBtn" href="#" target="_blank" class="flex items-center justify-center w-full py-3 px-4 bg-blue-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                    <i class="fa-solid fa-clapperboard mr-2"></i> ดู Playlist ทั้งหมดบน YouTube
                </a>
            </div>

            <div id="videoList" class="space-y-4">
                </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};

        window.onload = async function() {
            await init();
        };

        async function init() {
            try {
                const auth = await checkAuth(); 
                if (auth && auth.status === "success") {
                    MASTER_DATA = auth.data;
                    
                    if (auth.profile) {
                        document.getElementById('userName').innerText = auth.profile.displayName;
                    }

                    renderMenu();
                    
                    const packs = Object.keys(MASTER_DATA);
                    if (packs.length > 0) showPack(packs[0], 0);

                    // แสดงผลหน้าจอ
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('mainUI').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainUI').classList.add('opacity-100'), 50);
                } else {
                    alert("ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
                }
            } catch (err) {
                console.error("Init Error:", err);
            }
        }

        // 1. สร้างปุ่มเลือก Pack (เมนูบน)
        function renderMenu() {
            const menu = document.getElementById('packMenu');
            menu.innerHTML = "";
            
            Object.keys(MASTER_DATA).forEach((packName, index) => {
                const btn = document.createElement('button');
                // ปรับ UI ปุ่มให้นุ่มนวลและกดง่าย
                btn.className = "pack-btn px-6 py-2.5 rounded-2xl text-sm font-semibold whitespace-nowrap bg-white text-gray-500 flex-shrink-0";
                btn.id = `btn-${index}`;
                btn.innerText = packName;
                btn.onclick = () => showPack(packName, index);
                menu.appendChild(btn);
            });
        }

        // 2. แสดงข้อมูลวิดีโอใน Pack
        function showPack(packName, index) {
            // จัดการสถานะปุ่ม Active
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            document.getElementById(`btn-${index}`).classList.add('active-pack');

            const packInfo = MASTER_DATA[packName];
            document.getElementById('currentPackTitle').innerText = packName;
            
            // จัดการปุ่ม Playlist
            const pBtn = document.getElementById('playlistBtn');
            if (packInfo.playlistUrl) {
                pBtn.href = packInfo.playlistUrl;
                pBtn.style.display = 'flex';
            } else {
                pBtn.style.display = 'none';
            }

            // ล้างรายการเก่าและสร้างรายการใหม่
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = "";

            packInfo.videos.forEach(video => {
                const videoID = extractYoutubeID(video.url);
                const thumbUrl = videoID ? `https://img.youtube.com/vi/${videoID}/mqdefault.jpg` : 'https://via.placeholder.com/160x90';

                const card = `
                    <div class="video-card bg-white rounded-3xl shadow-sm border border-white p-3.5 flex gap-4 hover:shadow-md transition-all active:bg-gray-50" onclick="window.open('${video.url}', '_blank')">
                        <div class="relative flex-shrink-0 w-32 h-20 rounded-2xl overflow-hidden bg-gray-100">
                            <img src="${thumbUrl}" class="w-full h-full object-cover" alt="">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                                <div class="w-8 h-8 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center shadow-lg">
                                    <i class="fa-solid fa-play text-blue-600 text-[10px] ml-0.5"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center py-1">
                            <h3 class="text-[17px] font-bold text-gray-800 leading-snug">
                                <span class="text-blue-600 mr-0.5">${video.no}.</span> ${video.title}
                            </h3>
                            <div class="flex items-center mt-1.5 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                <i class="fa-brands fa-youtube text-red-500 mr-1.5 text-xs"></i> คลิกรับชมตอนนี้
                            </div>
                        </div>
                    </div>
                `;
                videoList.innerHTML += card;
            });
        }

        // 3. ฟังก์ชันพิเศษ (Share / Copy)
        function copyCurrentLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert("คัดลอกลิงก์เรียบร้อย!");
            });
        }

        async function shareToLine() {
            if (!liff.isApiAvailable('shareTargetPicker')) {
                alert("ระบบไม่รองรับการแชร์ในขณะนี้");
                return;
            }
            try {
                await liff.shareTargetPicker([
                    { "type": "text", "text": "hello" }
                ]);
            } catch (error) {
                console.error("Share failed", error);
            }
        }

        function extractYoutubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
