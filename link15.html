<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute - Pack System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .active-tab { background-color: #1e40af !important; color: white !important; border-color: #1e40af !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-50">
        <div class="flex overflow-x-auto p-4 gap-3 hide-scrollbar" id="tabContainer"></div>
    </div>

    <div class="max-w-2xl mx-auto p-4 pb-20">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500 animate-pulse">กำลังดึงข้อมูลจากระบบ...</p>
        </div>

        <div id="mainContent" class="hidden space-y-6">
            <div id="playlistSection">
                <a id="mainPlaylistBtn" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all">
                    <span class="text-xl">📺</span> <span>เปิด Playlist ทั้งหมดของ Pack นี้</span>
                </a>
            </div>
            <div id="videoList" class="space-y-3"></div>
        </div>
    </div>

    <script src="config.js"></script>

<script>

    let MASTER_DATA = {}; 

    async function init() {
        try {
            // ใช้ชื่อตัวแปร GAS_URL ตามที่คุณตั้งไว้ในไฟล์ config ได้เลย
            const response = await fetch(`${GAS_URL}?type=pack`);
            MASTER_DATA = await response.json();
            
            if (Object.keys(MASTER_DATA).length === 0) throw new Error("No Data");

            renderTabs();
            const urlParams = new URLSearchParams(window.location.search);
            switchPack(urlParams.get('id') || 'P1');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('loading').innerHTML = `<p class="text-red-500">⚠️ โหลดข้อมูลไม่สำเร็จ</p>`;
        }
    }

    // ... ฟังก์ชัน renderTabs และ switchPack อื่นๆ เหมือนเดิม ...
    init();
</script>
</body>
</html>
