<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buzzolute Link Pack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Inter:wght@400;700&display=swap');
        
        html, body { 
            max-width: 100%; 
            overflow-x: hidden; 
            font-family: 'Sarabun', sans-serif; 
            transition: background-color 0.3s;
        }

        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.96); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        #picker-overlay { transition: all 0.3s ease; }
        #picker-sheet { 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.8);
            opacity: 0;
        }
        #picker-overlay.active #picker-sheet { transform: scale(1); opacity: 1; }

        #wheel-container { overflow-x: hidden; overflow-y: auto; scroll-snap-type: y mandatory; }
        .wheel-item {
            scroll-snap-align: center;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            height: 50px; width: 100%; font-weight: 500; color: #94a3b8;
        }
        .wheel-item.active {
            color: #4f46e5; font-size: 1.4rem; font-weight: 700; transform: scale(1.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-card { transition: all 0.2s ease; cursor: pointer; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .fast-spin { animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        .grad-indigo { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 pb-10">

    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-slate-900">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full fast-spin"></div>
        <p class="mt-4 text-slate-500 dark:text-slate-400 font-medium text-sm">กำลังโหลดข้อมูล</p>
    </div>

    <div id="picker-overlay" class="fixed inset-0 z-[90] bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none flex items-center justify-center p-6">
        <div id="picker-sheet" class="w-full max-w-sm bg-white dark:bg-slate-800 rounded-[3rem] p-8 shadow-2xl relative overflow-hidden text-center">
            <h3 class="font-bold text-xl mb-6">เลือกชุดวิดีโอ</h3>
            <div class="relative h-[200px] no-scrollbar py-[75px]" id="wheel-container"></div>
            <div class="absolute left-8 right-8 top-[162px] h-[50px] border-y-2 border-indigo-100 dark:border-indigo-900/50 pointer-events-none"></div>
            <button onclick="togglePicker(false)" class="w-full mt-8 py-4 grad-indigo text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all">ตกลง</button>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-300">
        <header class="sticky top-0 z-50 glass border-b p-3 shadow-sm">
            <div class="max-w-2xl mx-auto flex items-center h-12 relative gap-3">
                <div id="header-default" class="flex items-center gap-3 w-full transition-all">
                    <div onclick="togglePicker(true)" class="flex-1 h-11 px-4 grad-indigo text-white rounded-2xl flex items-center justify-center cursor-pointer shadow-lg overflow-hidden">
                        <span id="selected-pack-name" class="font-bold text-base tracking-wide truncate">กำลังเลือก...</span>
                        <i class="fa-solid fa-chevron-down ml-2 text-xs opacity-80"></i>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleSearch(true)" class="w-11 h-11 rounded-2xl bg-gray-100 dark:bg-slate-800 flex items-center justify-center text-slate-400 shadow-sm"><i class="fa-solid fa-magnifying-glass"></i></button>
                        <button onclick="toggleDarkMode()" class="w-11 h-11 rounded-2xl bg-gray-100 dark:bg-slate-800 flex items-center justify-center shadow-sm"><i id="darkIcon" class="fa-solid fa-moon"></i></button>
                    </div>
                </div>

                <div id="header-search" class="absolute inset-0 flex items-center gap-2 bg-white dark:bg-slate-800 opacity-0 pointer-events-none transition-all duration-300 translate-x-10">
                    <button onclick="toggleSearch(false)" class="w-12 h-12 flex items-center justify-center text-slate-400 shrink-0"><i class="fa-solid fa-arrow-left"></i></button>
                    <div class="flex-1 relative mr-2">
                        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="ค้นหา..." class="w-full h-11 pl-4 pr-10 bg-slate-100 dark:bg-slate-700 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <button id="clearSearch" onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hidden"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 sm:p-6 max-w-2xl mx-auto">
            <section id="packActionRow" class="mb-8 flex items-center">
                <div class="flex items-center gap-2">
                    <a id="playlistBtn" href="#" target="_blank" class="h-10 px-4 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl flex items-center text-xs font-bold border border-blue-100 dark:border-blue-900/50 shadow-sm active:scale-95 transition-all">
                        <i class="fa-solid fa-play-circle mr-2 text-sm"></i>Playlist
                    </a>
                </div>
                <div class="flex-1"></div>
                <div class="flex gap-2">
                    <button id="copyAllBtn" onclick="copyCurrentLink()" class="h-10 px-5 bg-indigo-600 text-white rounded-xl font-bold text-xs flex items-center gap-2 shadow-lg active:scale-95 transition-all">
                        <i class="fa-regular fa-copy"></i> <span id="copyBtnText">คัดลอกทั้งหมด</span>
                    </button>
                    <button onclick="shareToLine()" class="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                        <i class="fa-solid fa-share-nodes"></i>
                    </button>
                </div>
            </section>

            <div id="videoList" class="space-y-4"></div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};
        let isDarkMode = false;
        let currentSelectedPack = "";

        window.onload = async function() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                isDarkMode = true;
                updateDarkIcon();
            }
            await init();
        };

        async function init() {
            try {
                const auth = await checkAuth(); 
                if (auth && auth.status === "success") {
                    MASTER_DATA = auth.data;
                    renderWheelPicker();
                    const packs = Object.keys(MASTER_DATA);
                    if (packs.length > 0) showPack(packs[0]);
                    document.getElementById('loading').style.display = 'none';
                    const mainUI = document.getElementById('mainUI');
                    mainUI.classList.remove('hidden');
                    setTimeout(() => mainUI.classList.add('opacity-100'), 50);
                }
            } catch (err) { console.error(err); }
        }

        function togglePicker(isOpen) {
            const overlay = document.getElementById('picker-overlay');
            if (isOpen) {
                overlay.classList.add('active');
                overlay.classList.remove('pointer-events-none', 'opacity-0');
            } else {
                overlay.classList.remove('active');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                if (currentSelectedPack) showPack(currentSelectedPack);
            }
        }

        function renderWheelPicker() {
            const container = document.getElementById('wheel-container');
            container.innerHTML = "";
            Object.keys(MASTER_DATA).forEach(name => {
                const item = document.createElement('div');
                item.className = "wheel-item";
                item.innerText = name;
                item.onclick = () => { currentSelectedPack = name; scrollToItem(item); };
                container.appendChild(item);
            });
            container.onscroll = () => {
                const items = container.querySelectorAll('.wheel-item');
                let closest = items[0];
                let minOffset = Math.abs(container.scrollTop + 75 - items[0].offsetTop);
                items.forEach(item => {
                    const offset = Math.abs(container.scrollTop + 75 - item.offsetTop);
                    if (offset < minOffset) { minOffset = offset; closest = item; }
                });
                currentSelectedPack = closest.innerText;
                updateWheelVisuals();
            };
        }

        function scrollToItem(el) { document.getElementById('wheel-container').scrollTop = el.offsetTop - 75; }
        function updateWheelVisuals() {
            const items = document.querySelectorAll('.wheel-item');
            items.forEach(item => item.classList.toggle('active', item.innerText === currentSelectedPack));
            document.getElementById('selected-pack-name').innerText = currentSelectedPack;
        }

        function createVideoCard(v, p) {
            const vidID = extractYoutubeID(v.url);
            // ถ้าในชีตไม่มีเวลา ให้แสดง --:-- หรือใส่ placeholder ไว้ก่อน
            const duration = v.duration || "--:--"; 

            return `
                <div class="video-card bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 flex items-center p-3 gap-4">
                    <div class="relative flex-shrink-0 w-24 h-16 sm:w-28 sm:h-18 rounded-2xl overflow-hidden bg-slate-100 shadow-inner" onclick="window.open('${v.url}', '_blank')">
                        <img src="https://img.youtube.com/vi/${vidID}/mqdefault.jpg" class="w-full h-full object-cover opacity-90">
                    </div>
                    <div class="flex-1 min-w-0" onclick="window.open('${v.url}', '_blank')">
                        <h3 class="text-[14px] sm:text-[15px] font-bold text-indigo-900 dark:text-blue-300 leading-tight line-clamp-2 mb-1 uppercase tracking-tight">${v.title}</h3>
                        <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium italic">#${v.no} | ${p}</p>
                    </div>
                    <div class="flex flex-col items-end gap-1.5 shrink-0 pr-1">
                        <span class="text-[10px] text-slate-400 dark:text-slate-600 font-bold flex items-center gap-1">
                            <i class="fa-regular fa-clock text-[9px]"></i> ${duration}
                        </span>
                        <div class="flex gap-1.5">
                            <button onclick="copySingle('${v.url}', this)" class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-700/50 text-slate-400 flex items-center justify-center transition-all hover:bg-indigo-50"><i class="fa-regular fa-copy text-xs"></i></button>
                            <button onclick="shareSingle('${v.url}', '${v.title}')" class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-700/50 text-slate-400 flex items-center justify-center transition-all hover:bg-emerald-50"><i class="fa-solid fa-share-nodes text-xs"></i></button>
                        </div>
                    </div>
                </div>`;
        }

        function showPack(p) {
            currentSelectedPack = p;
            const packInfo = MASTER_DATA[p];
            const pBtn = document.getElementById('playlistBtn');
            pBtn.href = packInfo.playlistUrl || "#";
            pBtn.style.display = packInfo.playlistUrl ? 'flex' : 'none';
            const vList = document.getElementById('videoList');
            vList.innerHTML = "";
            packInfo.videos.forEach(v => { vList.innerHTML += createVideoCard(v, p); });
            updateWheelVisuals();
        }

        // --- Search/Dark Mode/Utils ---
        function toggleSearch(isOpen) {
            const d = document.getElementById('header-default');
            const s = document.getElementById('header-search');
            if (isOpen) {
                s.classList.remove('pointer-events-none', 'opacity-0');
                s.classList.add('opacity-100', 'translate-x-0');
                d.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => document.getElementById('searchInput').focus(), 300);
            } else {
                s.classList.add('opacity-0', 'pointer-events-none');
                d.classList.remove('opacity-0', 'pointer-events-none');
                clearSearch();
            }
        }
        function handleSearch(q){ 
            const v=document.getElementById('videoList'), a=document.getElementById('packActionRow'), c=document.getElementById('clearSearch');
            c.classList.toggle('hidden',!q);
            if (!q.trim()) { a.classList.remove('hidden'); showPack(currentSelectedPack); return; }
            a.classList.add('hidden'); v.innerHTML="";
            Object.keys(MASTER_DATA).forEach(pk=>MASTER_DATA[pk].videos.forEach(vd=>{
                if(vd.title.toLowerCase().includes(q.toLowerCase())){ v.innerHTML+=createVideoCard(vd,pk); }
            }));
        }
        function clearSearch(){ document.getElementById('searchInput').value=""; handleSearch(""); }
        function toggleDarkMode(){ isDarkMode=!isDarkMode; document.documentElement.classList.toggle('dark',isDarkMode); localStorage.theme=isDarkMode?'dark':'light'; updateDarkIcon(); }
        function updateDarkIcon(){ document.getElementById('darkIcon').className=isDarkMode?'fa-solid fa-sun text-yellow-400':'fa-solid fa-moon'; }
        
        function copySingle(u,b){ navigator.clipboard.writeText(u).then(()=>{ b.innerHTML='<i class="fa-solid fa-check text-emerald-500"></i>'; setTimeout(()=>b.innerHTML='<i class="fa-regular fa-copy text-xs"></i>',1500); }); }
        
        // แก้ไขปุ่ม Share ให้กดติดแน่นอน
        async function shareSingle(u, t) {
            const shareData = { title: t, text: t + "\n" + u, url: u };
            try {
                // 1. ลองใช้ LIFF ShareTargetPicker ก่อน
                if (liff.isLoggedIn() && liff.isApiAvailable('shareTargetPicker')) {
                    await liff.shareTargetPicker([{ "type": "text", "text": t + "\n" + u }]);
                } else if (navigator.share) {
                    // 2. ถ้าไม่ได้ใช้ใน LINE หรือ LIFF ไม่พร้อม ให้ใช้ Native Share ของมือถือ
                    await navigator.share(shareData);
                } else {
                    // 3. ถ้าเบราว์เซอร์ไม่รองรับเลย ให้แจ้งเตือนและคัดลอกแทน
                    navigator.clipboard.writeText(u);
                    alert("คัดลอกลิงก์เรียบร้อยแล้ว (เบราว์เซอร์ไม่รองรับการแชร์โดยตรง)");
                }
            } catch (err) { console.log("Share failed", err); }
        }

        async function shareToLine() {
            const text = generatePackTemplate(currentSelectedPack);
            try {
                if (liff.isLoggedIn() && liff.isApiAvailable('shareTargetPicker')) {
                    await liff.shareTargetPicker([{ "type": "text", "text": text }]);
                } else if (navigator.share) {
                    await navigator.share({ title: currentSelectedPack, text: text });
                }
            } catch (err) { console.log(err); }
        }

        function copyCurrentLink(){ const text=generatePackTemplate(currentSelectedPack); navigator.clipboard.writeText(text).then(()=>{ const t=document.getElementById('copyBtnText'), b=document.getElementById('copyAllBtn'); t.innerText="คัดลอกแล้ว"; b.classList.replace('bg-indigo-600','bg-emerald-500'); setTimeout(()=>{ t.innerText="คัดลอกทั้งหมด"; b.classList.replace('bg-emerald-500','bg-indigo-600'); },2000); }); }
        function generatePackTemplate(p){ const info=MASTER_DATA[p]; let t=`${p}\n--------------\n\n`; if(info.playlistUrl) t+=`Playlist: ${info.playlistUrl}\n\n`; info.videos.forEach(v=>t+=`${v.no} : ${v.title}\n${v.url}\n\n`); return t.trim(); }
        function extractYoutubeID(u){ const m=u.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return (m&&m[2].length === 11)?m[2]:null; }
    </script>
</body>
</html>
