<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Pack System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .active-pack { background-color: #1e40af !important; color: white !important; transform: scale(1.1); box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.3); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="loading" class="flex flex-col items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-slate-500">กำลังตรวจสอบสิทธิ์สมาชิก...</p>
    </div>

    <div id="mainUI" class="hidden">
        <div class="sticky top-0 bg-white/90 backdrop-blur-sm shadow-sm z-50 border-b border-slate-200">
            <div class="max-w-6xl mx-auto p-4 flex overflow-x-auto gap-3 hide-scrollbar" id="packMenu"></div>
        </div>
        <div class="max-w-6xl mx-auto p-6 space-y-8">
            <h2 id="currentPackTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight"></h2>
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let MASTER_DATA = {};
        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                const userId = profile.userId;

                const response = await fetch(`${GAS_URL}?type=pack&userId=${userId}`);
                const result = await response.json();

                if (result.error === "NOT_MEMBER") {
                    window.location.href = "register.html"; // ไม่เป็นสมาชิก ดีดไปหน้าลงทะเบียน
                    return;
                }

                MASTER_DATA = result;
                renderMenu();
                showPack('P1');
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
            } catch (err) { console.error(err); }
        }

        function renderMenu() {
            const menu = document.getElementById('packMenu');
            Object.keys(MASTER_DATA).sort((a,b)=>parseInt(a.replace(/\D/g,''))-parseInt(b.replace(/\D/g,''))).forEach(id => {
                const btn = document.createElement('button');
                btn.id = `btn-${id}`;
                btn.className = "min-w-[55px] h-[55px] bg-white border border-slate-200 rounded-2xl font-bold text-slate-600 flex-shrink-0 flex items-center justify-center transition-all";
                btn.innerText = id.replace('P','');
                btn.onclick = () => showPack(id);
                menu.appendChild(btn);
            });
        }

        function showPack(id) {
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            document.getElementById(`btn-${id}`)?.classList.add('active-pack');
            document.getElementById('currentPackTitle').innerText = `Buzz Pack ${id.replace('P','')}`;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = MASTER_DATA[id].videos.map(v => {
                const vid = v.url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#&?]*)/)?.[1];
                return `
                    <a href="${v.url}" target="_blank" class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 block">
                        <img src="https://img.youtube.com/vi/${vid}/hqdefault.jpg" class="w-full aspect-video object-cover">
                        <div class="p-4 font-semibold text-slate-700 text-sm">${v.title}</div>
                    </a>
                `;
            }).join('');
        }
        initApp();
    </script>
</body>
</html>
