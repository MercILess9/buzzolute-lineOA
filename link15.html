<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute - Pack System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        /* สไตล์ปุ่มที่ถูกเลือก */
        .active-pack { 
            background-color: #1e40af !important; 
            color: white !important; 
            border-color: #1e40af !important;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        /* ซ่อน Scrollbar ของแถบเมนูตัวเลข */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .video-card { transition: all 0.2s ease; }
        .video-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-50 border-b border-slate-200">
        <div class="max-w-2xl mx-auto">
            <div class="px-4 pt-3 text-xs font-bold text-slate-400 uppercase tracking-wider">เลือกหมายเลข Pack</div>
            <div class="flex overflow-x-auto p-4 gap-3 hide-scrollbar" id="packMenu">
                </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto p-4 pb-20">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-500 animate-pulse">กำลังเชื่อมต่อข้อมูลจาก Google Sheet...</p>
        </div>

        <div id="mainContent" class="hidden space-y-6">
            <div class="flex items-center justify-between">
                <h2 id="currentPackLabel" class="text-2xl font-bold text-slate-800 italic">Pack 1</h2>
                <span class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded-md font-bold">Online</span>
            </div>

            <div id="videoContainer" class="space-y-3"></div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // MASTER_DATA จะเก็บข้อมูลวิดีโอของทุก Pack ไว้
        let MASTER_DATA = {}; 

        async function initApp() {
            try {
                // ดึงข้อมูลจาก Google Apps Script (ใส่ ?type=pack เพื่อแยกประเภท)
                const response = await fetch(`${GAS_URL}?type=pack`);
                MASTER_DATA = await response.json();
                
                // ตรวจสอบว่ามีข้อมูลส่งกลับมาไหม
                if (!MASTER_DATA || Object.keys(MASTER_DATA).length === 0) {
                    throw new Error("ไม่มีข้อมูลส่งกลับมาจาก Google Sheet");
                }

                // สร้างเมนูปุ่มตัวเลข
                renderMenu();
                
                // เริ่มต้นการแสดงผลที่ Pack 1
                displayPack('P1');

                // ซ่อนตัวโหลด และแสดงเนื้อหาจริง
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-red-100 text-center">
                        <p class="text-red-500 font-bold text-lg mb-2">⚠️ โหลดข้อมูลไม่สำเร็จ</p>
                        <p class="text-slate-400 text-sm italic">${error.message}</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">ลองอีกครั้ง</button>
                    </div>
                `;
            }
        }

        // ฟังก์ชันสร้างปุ่ม 1, 2, 3 ... ตามจำนวน Pack ที่มีใน Sheet
        function renderMenu() {
            const menu = document.getElementById('packMenu');
            // เรียงลำดับชื่อ Pack (P1, P2, P3...)
            const sortedKeys = Object.keys(MASTER_DATA).sort((a, b) => {
                return parseInt(a.replace('P', '')) - parseInt(b.replace('P', ''));
            });

            sortedKeys.forEach(id => {
                const btn = document.createElement('button');
                btn.id = `tab-${id}`;
                btn.className = "min-w-[50px] h-[50px] bg-white border border-slate-200 rounded-2xl font-bold text-slate-600 transition-all flex-shrink-0 flex items-center justify-center shadow-sm";
                btn.innerText = id.replace('P', '');
                btn.onclick = () => displayPack(id);
                menu.appendChild(btn);
            });
        }

        // ฟังก์ชันสลับข้อมูลบนหน้าจอ (Instant Switch)
        function displayPack(id) {
            const data = MASTER_DATA[id];
            if (!data) return;

            // 1. ไฮไลท์ปุ่มที่ถูกกด
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            const activeBtn = document.getElementById(`tab-${id}`);
            if (activeBtn) {
                activeBtn.classList.add('active-pack');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // 2. อัปเดตชื่อ Pack
            document.getElementById('currentPackLabel').innerText = `Buzz Pack ${id.replace('P', '')}`;

            // 3. วาดรายการวิดีโอใหม่
            const container = document.getElementById('videoContainer');
            if (data.videos && data.videos.length > 0) {
                container.innerHTML = data.videos.map(v => `
                    <a href="${v.url}" target="_blank" class="video-card flex items-center gap-4 bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                        <div class="w-10 h-10 bg-slate-50 text-slate-400 font-bold flex items-center justify-center rounded-full flex-shrink-0 text-sm border border-slate-100">
                            ${v.no}
                        </div>
                        <div class="flex-grow">
                            <h4 class="text-slate-700 font-semibold leading-tight">${v.title}</h4>
                            <p class="text-blue-500 text-xs mt-1 font-medium flex items-center gap-1">
                                <span>▶️</span> คลิกเพื่อรับชมวิดีโอ
                            </p>
                        </div>
                    </a>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center text-slate-400 py-10 italic">ยังไม่มีข้อมูลวิดีโอใน Pack นี้</p>`;
            }
        }

        // เริ่มต้นการทำงาน
        initApp();
    </script>
</body>
</html>
