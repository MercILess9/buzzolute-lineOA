<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Pack System - Video Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        
        /* สไตล์ปุ่มตัวเลขที่ถูกเลือก */
        .active-pack { 
            background-color: #1e40af !important; 
            color: white !important; 
            border-color: #1e40af !important;
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.3);
        }
        
        /* ซ่อน Scrollbar ของแถบเมนูตัวเลข */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Effect สำหรับ Card วิดีโอ */
        .video-card { transition: all 0.3s ease; }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .video-card:active { transform: scale(0.98); }
        
        /* อัตราส่วนภาพ 16:9 สำหรับ Thumbnail */
        .aspect-video { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="sticky top-0 bg-white/90 backdrop-blur-sm shadow-sm z-50 border-b border-slate-200">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between p-4 pb-2">
                <h1 class="text-xl font-bold text-slate-800">Buzzolute Packs</h1>
                <span class="text-xs font-semibold text-slate-400">เลือก Pack</span>
            </div>
            <div class="flex overflow-x-auto gap-3 p-4 pt-0 hide-scrollbar" id="packMenu">
                </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-6 pb-24">
        
        <div id="loading" class="flex flex-col items-center justify-center py-24 text-blue-600">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-current mb-4"></div>
            <p class="animate-pulse font-medium text-slate-600">กำลังเชื่อมต่อข้อมูล...</p>
        </div>

        <div id="mainDisplay" class="hidden space-y-8">
            
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                <h2 id="currentPackTitle" class="text-3xl font-extrabold text-slate-900 tracking-tight"></h2>
                
                <div id="playlistArea">
                    <a id="playlistBtn" href="#" target="_blank" 
                       class="flex items-center justify-center gap-2.5 px-6 py-3.5 bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-md hover:bg-blue-700 transition-colors w-full sm:w-auto">
                        <span class="text-lg">📺</span>
                        <span>เปิดดู Playlist ทั้งหมด</span>
                    </a>
                </div>
            </div>

            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>
        
        <div id="errorDisplay" class="hidden p-10 bg-white text-center rounded-3xl border border-red-100 shadow-sm">
            <p class="text-red-500 font-bold text-xl mb-3">⚠️ Error</p>
            <p id="errorMessage" class="text-slate-500 text-sm italic"></p>
            <button onclick="location.reload()" class="mt-6 px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold">ลองอีกครั้ง</button>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // MASTER_DATA เก็บข้อมูลของทุก Pack ไว้
        let MASTER_DATA = {}; 

        async function initApp() {
            try {
                // เรียกข้อมูลจาก GAS URL ในไฟล์ config.js
                const response = await fetch(`${GAS_URL}?type=pack`);
                const result = await response.json();
                
                if (result.error) throw new Error(result.error);
                if (!result || Object.keys(result).length === 0) throw new Error("ไม่มีข้อมูล");

                MASTER_DATA = result;
                renderPackMenu();
                
                // เริ่มต้นที่ Pack 1
                showPack('P1');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainDisplay').style.display = 'block';
            } catch (error) {
                console.error("App Error:", error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorMessage').innerText = error.message;
                document.getElementById('errorDisplay').classList.remove('hidden');
            }
        }

        // ฟังก์ชันช่วยดึง YouTube Video ID จาก URL
        function getYouTubeId(url) {
            const regex = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regex);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // ฟังก์ชันสร้างปุ่มตัวเลข 1-15
        function renderPackMenu() {
            const menu = document.getElementById('packMenu');
            const keys = Object.keys(MASTER_DATA).sort((a,b) => 
                parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,''))
            );

            keys.forEach(id => {
                const num = id.replace('P', '');
                const btn = document.createElement('button');
                btn.id = `btn-${id}`;
                btn.className = "min-w-[55px] h-[55px] bg-white border border-slate-200 rounded-2xl font-bold text-slate-600 flex-shrink-0 flex items-center justify-center shadow-sm transition-all";
                btn.innerText = num;
                btn.onclick = () => showPack(id);
                menu.appendChild(btn);
            });
        }

        // ฟังก์ชันหลักในการแสดงผล Pack ที่เลือก
        function showPack(id) {
            const data = MASTER_DATA[id];
            if (!data) return;

            // 1. ไฮไลท์ปุ่มที่ถูกเลือก
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            document.getElementById(`btn-${id}`)?.classList.add('active-pack');
            document.getElementById(`btn-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // 2. อัปเดตชื่อ Pack
            document.getElementById('currentPackTitle').innerText = `Buzz Pack ${id.replace('P', '')}`;

            // 3. แสดง/ซ่อนปุ่ม Playlist
            const pBtn = document.getElementById('playlistBtn');
            if (data.playlistUrl) {
                pBtn.href = data.playlistUrl;
                document.getElementById('playlistArea').style.display = 'block';
            } else {
                document.getElementById('playlistArea').style.display = 'none';
            }

            // 4. วาดรายการวิดีโอใหม่ในรูปแบบ Grid พร้อมรูป Thumbnail
            const grid = document.getElementById('videoGrid');
            if (data.videos && data.videos.length > 0) {
                grid.innerHTML = data.videos.map(v => {
                    const videoId = getYouTubeId(v.url);
                    // ใช้รูปคุณภาพสูง hqdefault.jpg
                    const thumbnailUrl = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : 'https://via.placeholder.com/480x360.png?text=No+Thumbnail';
                    
                    return `
                        <a href="${v.url}" target="_blank" class="video-card block bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                            <div class="aspect-video bg-slate-100 relative overflow-hidden">
                                <img src="${thumbnailUrl}" alt="${v.title}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                    <div class="w-14 h-14 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/50 shadow-lg text-white text-xl">
                                        ▶️
                                    </div>
                                </div>
                                <div class="absolute top-3 left-3 bg-blue-600/90 text-white text-xs font-bold w-7 h-7 flex items-center justify-center rounded-full shadow-md backdrop-blur-sm">
                                    ${v.no}
                                </div>
                            </div>
                            <div class="p-5">
                                <h4 class="text-slate-800 font-semibold leading-snug line-clamp-2 min-h-[2.5rem]">${v.title}</h4>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                grid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-16 italic">ยังไม่มีข้อมูลวิดีโอใน Pack นี้</div>`;
            }
        }

        // เริ่มต้นการทำงาน
        initApp();
    </script>
</body>
</html>
