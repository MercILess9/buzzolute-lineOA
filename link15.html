<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buzzolute Link Pack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap');
        
        html, body { 
            max-width: 100%; overflow-x: hidden; 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc;
        }

        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.96); }

        /* Modal Base */
        .modal-overlay { 
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-box { 
            width: 90%; max-width: 400px; background: white; border-radius: 2.5rem;
            padding: 2rem; transform: scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark .modal-box { background: #1e293b; color: white; }
        .active .modal-box { transform: scale(1); }

        /* Wheel Picker */
        #wheel-container { 
            height: 200px; overflow-y: auto; scroll-snap-type: y mandatory; 
            padding: 75px 0;
        }
        .wheel-item {
            height: 50px; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: center; color: #94a3b8; font-weight: 500; transition: 0.3s;
        }
        .wheel-item.active { color: #4f46e5; font-size: 1.4rem; font-weight: 800; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .grad-indigo { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        .fast-spin { animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 pb-10">

    <div id="loading" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-white dark:bg-slate-900">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full fast-spin"></div>
        <p class="mt-4 text-slate-500 font-medium text-sm">กำลังโหลดข้อมูล</p>
    </div>

    <div id="picker-overlay" class="modal-overlay">
        <div class="modal-box text-center shadow-2xl relative">
            <h3 class="font-extrabold text-xl mb-6 text-indigo-600">เลือก</h3>
            <div id="wheel-container" class="no-scrollbar relative"></div>
            <div class="absolute left-8 right-8 top-[152px] h-[50px] border-y-2 border-indigo-100 dark:border-indigo-900/30 pointer-events-none"></div>
            <button onclick="togglePicker(false)" class="w-full mt-8 py-4 grad-indigo text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ตกลง</button>
        </div>
    </div>

    <div id="copy-selector-overlay" class="modal-overlay">
        <div class="modal-box flex flex-col max-h-[80vh] shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-extrabold text-lg text-indigo-600">เลือกที่จะคัดลอก</h3>
                <button onclick="toggleCopySelector(false)" class="text-slate-400"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            </div>
            
            <div class="flex items-center gap-2 mb-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)" class="w-5 h-5 accent-indigo-600 cursor-pointer">
                <label for="selectAll" class="text-sm font-bold cursor-pointer">เลือกทั้งหมด</label>
            </div>

            <div id="copy-options-list" class="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1"></div>

            <button onclick="executeCopySelected()" class="w-full mt-6 py-4 grad-indigo text-white rounded-2xl font-bold active:scale-95 transition-all">คัดลอกรายการที่เลือก</button>
        </div>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-300">
        <header class="sticky top-0 z-50 glass border-b p-3 shadow-sm">
            <div class="max-w-2xl mx-auto flex items-center h-12 gap-3">
                <div onclick="togglePicker(true)" class="flex-1 h-11 px-4 grad-indigo text-white rounded-2xl flex items-center justify-center cursor-pointer shadow-lg overflow-hidden">
                    <span id="selected-pack-name" class="font-extrabold text-lg truncate tracking-wide">เลือก</span>
                    <i class="fa-solid fa-chevron-down ml-2 text-xs opacity-70"></i>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleSearch(true)" class="w-11 h-11 rounded-2xl bg-gray-100 dark:bg-slate-800 flex items-center justify-center text-slate-400"><i class="fa-solid fa-magnifying-glass text-sm"></i></button>
                    <button onclick="toggleDarkMode()" class="w-11 h-11 rounded-2xl bg-gray-100 dark:bg-slate-800 flex items-center justify-center text-slate-400"><i id="darkIcon" class="fa-solid fa-moon"></i></button>
                </div>
            </div>
        </header>

        <main class="p-4 sm:p-6 max-w-2xl mx-auto">
            <section class="mb-8 flex items-center justify-between">
                <a id="playlistBtn" href="#" target="_blank" class="h-10 px-6 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl flex items-center text-[13px] font-bold border border-blue-100 dark:border-blue-900/50 shadow-sm active:scale-95 transition-all">
                    <i class="fa-solid fa-play-circle mr-2"></i> Playlist
                </a>
                
                <div class="flex gap-2">
                    <button onclick="prepareCopySelector()" class="h-10 px-5 bg-indigo-600 text-white rounded-xl font-bold text-[13px] flex items-center gap-2 shadow-lg active:scale-95 transition-all">
                        <i class="fa-regular fa-copy"></i> คัดลอกข้อมูล
                    </button>
                    <button onclick="shareToLine()" class="w-10 h-10 bg-emerald-500 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                        <i class="fa-solid fa-share-nodes text-lg"></i>
                    </button>
                </div>
            </section>

            <div id="videoList" class="space-y-4"></div>
        </main>
    </div>

    <div id="header-search" class="fixed top-0 inset-x-0 z-[60] glass border-b p-3 flex items-center gap-2 transform -translate-y-full transition-transform duration-300">
        <button onclick="toggleSearch(false)" class="w-10 h-10 flex items-center justify-center text-slate-400"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="flex-1 relative">
            <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="ค้นหาวิดีโอ..." class="w-full h-11 pl-4 pr-10 bg-slate-100 dark:bg-slate-800 border-none rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="clearSearch" onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hidden"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};
        let isDarkMode = false;
        let currentSelectedPack = "";

        window.onload = async function() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark'); isDarkMode = true; updateDarkIcon();
            }
            await init();
        };

        async function init() {
            try {
                const auth = await checkAuth(); 
                if (auth && auth.status === "success") {
                    MASTER_DATA = auth.data;
                    renderWheelPicker();
                    const packs = Object.keys(MASTER_DATA);
                    if (packs.length > 0) showPack(packs[0]);
                    document.getElementById('loading').style.display = 'none';
                    const mainUI = document.getElementById('mainUI');
                    mainUI.classList.remove('hidden');
                    setTimeout(() => mainUI.classList.add('opacity-100'), 50);
                }
            } catch (err) { console.error(err); }
        }

        // --- Wheel Picker ---
        function togglePicker(isOpen) {
            const overlay = document.getElementById('picker-overlay');
            if (isOpen) overlay.classList.add('active');
            else { overlay.classList.remove('active'); showPack(currentSelectedPack); }
        }

        function renderWheelPicker() {
            const container = document.getElementById('wheel-container');
            container.innerHTML = "";
            Object.keys(MASTER_DATA).forEach(name => {
                const item = document.createElement('div');
                item.className = "wheel-item";
                item.innerText = name;
                item.onclick = () => { currentSelectedPack = name; scrollToItem(item); };
                container.appendChild(item);
            });
            container.onscroll = () => {
                const items = container.querySelectorAll('.wheel-item');
                let closest = items[0];
                let minOffset = Math.abs(container.scrollTop + 75 - items[0].offsetTop);
                items.forEach(item => {
                    const offset = Math.abs(container.scrollTop + 75 - item.offsetTop);
                    if (offset < minOffset) { minOffset = offset; closest = item; }
                });
                currentSelectedPack = closest.innerText;
                updateWheelVisuals();
            };
        }
        function scrollToItem(el) { document.getElementById('wheel-container').scrollTop = el.offsetTop - 75; }
        function updateWheelVisuals() {
            const items = document.querySelectorAll('.wheel-item');
            items.forEach(item => item.classList.toggle('active', item.innerText === currentSelectedPack));
            // แสดงชื่อแพ็กจริงเมื่อเลือกแล้ว
            if(currentSelectedPack) document.getElementById('selected-pack-name').innerText = currentSelectedPack;
        }

        // --- Copy Selector Logic (Updated Format) ---
        function toggleCopySelector(o) { document.getElementById('copy-selector-overlay').classList.toggle('active', o); }
        function prepareCopySelector() {
            const packInfo = MASTER_DATA[currentSelectedPack];
            const list = document.getElementById('copy-options-list');
            list.innerHTML = "";
            document.getElementById('selectAll').checked = false;
            if (packInfo.playlistUrl) list.innerHTML += createCopyItem('playlist', `Playlist (${currentSelectedPack})`, packInfo.playlistUrl);
            packInfo.videos.forEach(v => list.innerHTML += createCopyItem('video', `Track ${v.no} : ${v.title}`, v.url, v.title, v.no));
            toggleCopySelector(true);
        }
        function createCopyItem(type, label, url, title="", no="") {
            return `<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-700 border border-slate-100 dark:border-slate-600 rounded-xl">
                <input type="checkbox" class="copy-checkbox w-5 h-5 accent-indigo-600" data-type="${type}" data-url="${url}" data-title="${title}" data-no="${no}">
                <p class="text-sm font-bold line-clamp-1 flex-1">${label}</p>
            </div>`;
        }
        function toggleSelectAll(checked) { document.querySelectorAll('.copy-checkbox').forEach(cb => cb.checked = checked); }
        
        function executeCopySelected() {
            const checkboxes = document.querySelectorAll('.copy-checkbox:checked');
            if (!checkboxes.length) return alert("กรุณาเลือกอย่างน้อย 1 รายการ");
            
            // ใช้ฟังก์ชันกลางในการสร้าง Text
            let textToCopy = `${currentSelectedPack}\n--------------\n\n`;
            
            checkboxes.forEach(cb => {
                const type = cb.dataset.type;
                const url = cb.dataset.url;
                if (type === 'playlist') {
                    textToCopy += `Playlist (${currentSelectedPack})\n${url}\n\n`;
                } else {
                    const title = cb.dataset.title;
                    const no = cb.dataset.no;
                    textToCopy += `${no} (${currentSelectedPack}) : ${title}\n${url}\n\n`;
                }
            });

            navigator.clipboard.writeText(textToCopy.trim()).then(() => {
                toggleCopySelector(false);
                alert("คัดลอกข้อมูลเรียบร้อย!");
            });
        }

        // --- Core ---
        function showPack(p) {
            currentSelectedPack = p;
            document.getElementById('selected-pack-name').innerText = p;
            const packInfo = MASTER_DATA[p];
            document.getElementById('playlistBtn').href = packInfo.playlistUrl || "#";
            const vList = document.getElementById('videoList');
            vList.innerHTML = "";
            packInfo.videos.forEach(v => {
                const vidID = extractYoutubeID(v.url);
                vList.innerHTML += `<div class="video-card bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 flex items-center p-3 gap-4">
                    <div class="w-24 h-16 rounded-2xl overflow-hidden bg-slate-100 flex-shrink-0" onclick="window.open('${v.url}','_blank')">
                        <img src="https://img.youtube.com/vi/${vidID}/mqdefault.jpg" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0" onclick="window.open('${v.url}','_blank')">
                        <h3 class="text-[14px] font-bold text-indigo-900 dark:text-blue-300 line-clamp-2 mb-1 tracking-tight">${v.title}</h3>
                        <p class="text-[10px] text-slate-400 italic">#${v.no} | ${p}</p>
                    </div>
                    <div class="flex gap-1.5 pr-1">
                        <button onclick="copySingle('${v.url}',this)" class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-700 text-slate-400 flex items-center justify-center"><i class="fa-regular fa-copy text-xs"></i></button>
                    </div>
                </div>`;
            });
            updateWheelVisuals();
        }

        // --- Utils ---
        function toggleSearch(o) { document.getElementById('header-search').style.transform = o ? 'translateY(0)' : 'translateY(-100%)'; if(o) setTimeout(()=>document.getElementById('searchInput').focus(),300); }
        function handleSearch(q) {
            const v=document.getElementById('videoList'), c=document.getElementById('clearSearch');
            c.classList.toggle('hidden', !q); v.innerHTML = "";
            Object.keys(MASTER_DATA).forEach(pk => MASTER_DATA[pk].videos.forEach(vd => {
                if(vd.title.toLowerCase().includes(q.toLowerCase())) v.innerHTML += `<div class="p-4 bg-white dark:bg-slate-800 rounded-2xl border mb-2 shadow-sm" onclick="window.open('${vd.url}','_blank')"><h4 class="font-bold text-sm text-indigo-900 dark:text-blue-300">${vd.title}</h4><p class="text-xs text-slate-400">#${vd.no} | ${pk}</p></div>`;
            }));
        }
        function clearSearch() { document.getElementById('searchInput').value = ""; handleSearch(""); }
        function toggleDarkMode() { isDarkMode = !isDarkMode; document.documentElement.classList.toggle('dark', isDarkMode); localStorage.theme = isDarkMode ? 'dark' : 'light'; updateDarkIcon(); }
        function updateDarkIcon() { document.getElementById('darkIcon').className = isDarkMode ? 'fa-solid fa-sun text-yellow-400' : 'fa-solid fa-moon'; }
        function copySingle(u,b) { navigator.clipboard.writeText(u).then(()=> { b.innerHTML='<i class="fa-solid fa-check text-emerald-500"></i>'; setTimeout(()=>b.innerHTML='<i class="fa-regular fa-copy text-xs"></i>',1500); }); }
        
        async function shareToLine() {
            // ฟังก์ชันแชร์ ใช้ Format เดียวกับ Copy
            const textToShare = generatePackTemplate(currentSelectedPack);
            try { await liff.shareTargetPicker([{"type":"text","text":textToShare}]); } catch(e){} 
        }

        function generatePackTemplate(p){
            const info = MASTER_DATA[p];
            let t = `${p}\n--------------\n\n`;
            if (info.playlistUrl) t += `Playlist (${p})\n${info.playlistUrl}\n\n`;
            info.videos.forEach(v => {
                t += `${v.no} (${p}) : ${v.title}\n${v.url}\n\n`;
            });
            return t.trim();
        }

        function extractYoutubeID(u){ const m=u.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/); return (m&&m[2].length===11)?m[2]:null; }
    </script>
</body>
</html>
