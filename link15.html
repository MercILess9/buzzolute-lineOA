<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buzzolute Link Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script>
        // ตั้งค่า Tailwind Dark Mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; transition: background-color 0.3s; }
        
        /* Glassmorphism Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }
        .dark .glass { 
            background: rgba(15, 23, 42, 0.8); 
            border-color: rgba(255, 255, 255, 0.1);
        }

        .video-card { transition: all 0.2s ease; position: relative; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Badge สไตล์ใหม่ */
        .track-badge {
            position: absolute; top: 6px; left: 6px;
            background: #3b82f6; color: white;
            padding: 2px 6px; border-radius: 6px;
            font-size: 10px; font-weight: 800; z-index: 10;
        }

        /* Fast Spin */
        .fast-spin { animation: spin 0.6s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 pb-10">

    <div id="loading" class="fixed inset-0 z-[60] flex flex-col items-center justify-center bg-white dark:bg-slate-900">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full fast-spin"></div>
        <p class="mt-4 text-gray-500 dark:text-gray-400 font-medium">กำลังโหลดข้อมูล</p>
    </div>

    <div id="mainUI" class="hidden opacity-0 transition-opacity duration-300">
        
        <div class="p-4 bg-white dark:bg-slate-800 border-b dark:border-slate-700 space-y-3">
            <div class="flex items-center justify-between gap-3">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" oninput="handleSearch(this.value)" 
                        placeholder="ค้นหาวิดีโอจากทุก Pack..." 
                        class="w-full h-11 pl-10 pr-4 bg-gray-100 dark:bg-slate-700 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <button onclick="toggleDarkMode()" class="w-11 h-11 rounded-2xl bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-lg">
                    <i id="darkIcon" class="fa-solid fa-moon text-slate-600 dark:text-yellow-400"></i>
                </button>
            </div>
        </div>

        <nav class="sticky top-0 z-40 glass border-b p-3 shadow-sm">
            <div class="flex gap-2 max-w-md mx-auto">
                <div class="flex-1 relative">
                    <select id="packSelect" onchange="handlePackChange(this.value)" 
                        class="w-full h-11 pl-4 pr-10 bg-white dark:bg-slate-800 border dark:border-slate-600 rounded-xl text-sm font-bold text-blue-600 dark:text-blue-400 outline-none appearance-none">
                        </select>
                </div>
                <a id="playlistBtn" href="#" target="_blank" class="h-11 px-4 bg-blue-600 text-white rounded-xl flex items-center justify-center text-xs font-bold shadow-lg shadow-blue-200 dark:shadow-none">
                    <i class="fa-solid fa-list-ul mr-2"></i> Playlist
                </a>
            </div>
        </nav>

        <main class="p-5 max-w-md mx-auto">
            <section id="packInfoSection" class="mb-6">
                <h2 id="currentPackTitle" class="text-2xl font-extrabold mb-5 tracking-tight"></h2>
                
                <div class="flex gap-2">
                    <button id="copyBtn" onclick="copyCurrentLink()" 
                        class="flex-[4] h-14 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-100 dark:shadow-none flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i class="fa-regular fa-copy text-lg"></i> คัดลอกข้อมูลทั้งหมด
                    </button>
                    <button onclick="shareToLine()" 
                        class="flex-1 h-14 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-xl shadow-green-100 dark:shadow-none active:scale-90 transition-all">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                    </button>
                </div>
            </section>

            <div id="videoList" class="space-y-4">
                </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};
        let isDarkMode = false;

        window.onload = async function() {
            // โหลด Dark Mode เริ่มต้น
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                isDarkMode = true;
                updateDarkIcon();
            }
            await init();
        };

        async function init() {
            try {
                const auth = await checkAuth(); 
                if (auth && auth.status === "success") {
                    MASTER_DATA = auth.data;
                    renderDropdown();
                    const packs = Object.keys(MASTER_DATA);
                    if (packs.length > 0) showPack(packs[0]);
                    
                    document.getElementById('loading').style.display = 'none';
                    const mainUI = document.getElementById('mainUI');
                    mainUI.classList.remove('hidden');
                    setTimeout(() => mainUI.classList.add('opacity-100'), 50);
                }
            } catch (err) { console.error(err); }
        }

        // --- Dark Mode Logic ---
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            }
            updateDarkIcon();
        }

        function updateDarkIcon() {
            const icon = document.getElementById('darkIcon');
            icon.className = isDarkMode ? 'fa-solid fa-sun text-yellow-400' : 'fa-solid fa-moon text-slate-600';
        }

        // --- Search Logic (ค้นหาทุก Pack) ---
        function handleSearch(query) {
            const videoList = document.getElementById('videoList');
            const infoSection = document.getElementById('packInfoSection');
            
            if (!query.trim()) {
                infoSection.classList.remove('hidden');
                showPack(document.getElementById('packSelect').value);
                return;
            }

            // ซ่อนหัวข้อ Pack เมื่อค้นหา
            infoSection.classList.add('hidden');
            videoList.innerHTML = "";
            let resultsFound = false;

            Object.keys(MASTER_DATA).forEach(packName => {
                MASTER_DATA[packName].videos.forEach(video => {
                    if (video.title.toLowerCase().includes(query.toLowerCase())) {
                        resultsFound = true;
                        videoList.innerHTML += createVideoCard(video, packName);
                    }
                });
            });

            if (!resultsFound) {
                videoList.innerHTML = `<p class="text-center text-gray-400 py-10">ไม่พบวิดีโอที่ค้นหา</p>`;
            }
        }

        function renderDropdown() {
            const select = document.getElementById('packSelect');
            Object.keys(MASTER_DATA).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                select.appendChild(opt);
            });
        }

        function handlePackChange(val) {
            document.getElementById('searchInput').value = ""; // ล้างค่าค้นหาเมื่อเปลี่ยน Pack
            document.getElementById('packInfoSection').classList.remove('hidden');
            showPack(val);
        }

        function showPack(packName) {
            const packInfo = MASTER_DATA[packName];
            document.getElementById('currentPackTitle').innerText = packName;
            const pBtn = document.getElementById('playlistBtn');
            pBtn.href = packInfo.playlistUrl || "#";
            pBtn.style.display = packInfo.playlistUrl ? 'flex' : 'none';

            const videoList = document.getElementById('videoList');
            videoList.innerHTML = "";
            packInfo.videos.forEach(video => {
                videoList.innerHTML += createVideoCard(video, packName);
            });
        }

        // ฟังก์ชันสร้าง Card (แยกออกมาเพื่อใช้ซ้ำตอน Search)
        function createVideoCard(video, packName) {
            const videoID = extractYoutubeID(video.url);
            const thumbUrl = videoID ? `https://img.youtube.com/vi/${videoID}/mqdefault.jpg` : 'https://via.placeholder.com/120x68';
            
            return `
                <div class="video-card bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden flex items-center p-2.5 gap-3">
                    <div class="relative flex-shrink-0 w-24 h-16 rounded-lg overflow-hidden bg-slate-100 dark:bg-slate-700" onclick="window.open('${video.url}', '_blank')">
                        <div class="track-badge">#${video.no}</div>
                        <img src="${thumbUrl}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                            <i class="fa-solid fa-play text-white/80 text-[10px]"></i>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0" onclick="window.open('${video.url}', '_blank')">
                        <h3 class="text-[14px] font-bold leading-tight mb-1 line-clamp-2">${video.title}</h3>
                        <p class="text-[10px] text-gray-400 dark:text-gray-500 truncate">${video.url}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="copySingle('${video.url}', this)" class="w-9 h-9 rounded-xl bg-gray-50 dark:bg-slate-700 text-gray-400 flex items-center justify-center transition-all">
                            <i class="fa-regular fa-copy text-xs"></i>
                        </button>
                        <button onclick="shareSingle('${video.url}', '${video.title}')" class="w-9 h-9 rounded-xl bg-gray-50 dark:bg-slate-700 text-gray-400 flex items-center justify-center transition-all">
                            <i class="fa-solid fa-share-nodes text-xs"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- Helper Functions ---
        function copySingle(url, btn) {
            navigator.clipboard.writeText(url).then(() => {
                const icon = btn.querySelector('i');
                icon.className = 'fa-solid fa-check text-green-500';
                setTimeout(() => { icon.className = 'fa-regular fa-copy text-gray-400'; }, 1500);
            });
        }

        async function shareSingle(url, title) {
            if (!liff.isApiAvailable('shareTargetPicker')) return;
            try { await liff.shareTargetPicker([{ "type": "text", "text": `${title}\n${url}` }]); } catch (err) { console.error(err); }
        }

        function copyCurrentLink() {
            const packName = document.getElementById('packSelect').value;
            const textToCopy = generatePackTemplate(packName);
            const btn = document.getElementById('copyBtn');
            navigator.clipboard.writeText(textToCopy).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check"></i> คัดลอกเรียบร้อย!`;
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);
            });
        }

        async function shareToLine() {
            const packName = document.getElementById('packSelect').value;
            const shareText = generatePackTemplate(packName);
            try { await liff.shareTargetPicker([{ "type": "text", "text": shareText }]); } catch (err) { console.error(err); }
        }

        function generatePackTemplate(packName) {
            const packInfo = MASTER_DATA[packName];
            let template = `${packName}\n--------------\n\n`;
            if (packInfo.playlistUrl) template += `Playlist (${packName})\n${packInfo.playlistUrl}\n\n`;
            packInfo.videos.forEach(v => { template += `${v.no} (${packName}) : ${v.title}\n${v.url}\n\n`; });
            return template.trim();
        }

        function extractYoutubeID(url) {
            const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
