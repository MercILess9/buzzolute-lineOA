<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Link Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc; /* สีพื้นหลังโทนสว่างดูสะอาด */
        }
        
        /* สไตล์ปุ่มเลือก Pack (Navigation) */
        .pack-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }
        .active-pack {
            background: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transform: translateY(-2px);
        }
        
        /* การ์ดวิดีโอ */
        .video-card {
            transition: all 0.2s ease;
        }
        .video-card:active {
            transform: scale(0.96);
        }

        /* ซ่อน Scrollbar สำหรับเมนู */
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-12 text-gray-900">

    <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-500 font-light">กำลังโหลดความรู้...</p>
    </div>

    <div id="mainUI" class="opacity-0 transition-opacity duration-500 hidden">
        
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 border-b flex justify-between items-center">
            <h1 class="text-xl font-black italic bg-gradient-to-r from-blue-800 to-blue-500 bg-clip-text text-transparent">
                BUZZOLUTE
            </h1>
            <span id="userName" class="text-[11px] bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-bold"></span>
        </header>

        <div class="bg-white shadow-sm sticky top-[61px] z-30">
            <div class="px-6 pt-4">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-3">หมวดหมู่วิดีโอ</p>
            </div>
            <div class="flex gap-3 overflow-x-auto px-6 pb-5 custom-scrollbar" id="packMenu">
                </div>
        </div>

        <main class="p-6">
            <div class="mb-8 bg-white p-6 rounded-[2.5rem] shadow-xl shadow-blue-900/5 border border-white">
                <div class="flex items-start justify-between mb-6">
                    <div>
                        <h2 id="currentPackTitle" class="text-3xl font-extrabold text-gray-900 tracking-tight"></h2>
                        <p class="text-xs text-gray-400 mt-1">คัดลอกหรือแชร์ข้อมูลชุดนี้ได้ทันที</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyCurrentLink()" class="w-12 h-12 flex items-center justify-center bg-gray-50 text-gray-400 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors shadow-sm">
                            <i class="fa-regular fa-copy text-xl"></i>
                        </button>
                        <button onclick="shareToLine()" class="w-12 h-12 flex items-center justify-center bg-green-50 text-green-600 rounded-2xl border border-green-100 hover:bg-green-100 transition-colors shadow-sm">
                            <i class="fa-solid fa-share-nodes text-xl"></i>
                        </button>
                    </div>
                </div>
                
                <a id="playlistBtn" href="#" target="_blank" class="flex items-center justify-center w-full py-4 bg-blue-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                    <i class="fa-solid fa-layer-group mr-2 text-lg"></i> เปิด Playlist ทั้งหมดใน YouTube
                </a>
            </div>

            <div id="videoList" class="space-y-5">
                </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};

        window.onload = async function() {
            await init();
        };

        async function init() {
            try {
                const auth = await checkAuth(); 
                if (auth && auth.status === "success") {
                    MASTER_DATA = auth.data;
                    
                    if (auth.profile) {
                        document.getElementById('userName').innerText = auth.profile.displayName;
                    }

                    renderMenu();
                    
                    const packs = Object.keys(MASTER_DATA);
                    if (packs.length > 0) showPack(packs[0], 0);

                    // ปิด Loading และแสดงผล
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('mainUI').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainUI').classList.add('opacity-100'), 50);
                } else {
                    alert("ไม่พบข้อมูลสมาชิก หรือมีข้อผิดพลาดเกิดขึ้น");
                }
            } catch (err) {
                console.error("Init Error:", err);
            }
        }

        // 1. ฟังก์ชันสร้างปุ่มเมนู (Pill Tabs)
        function renderMenu() {
            const menu = document.getElementById('packMenu');
            menu.innerHTML = "";
            
            Object.keys(MASTER_DATA).forEach((packName, index) => {
                const btn = document.createElement('button');
                btn.className = "pack-btn px-7 py-3 rounded-2xl text-sm font-bold whitespace-nowrap bg-white text-gray-400 flex-shrink-0";
                btn.id = `btn-${index}`;
                btn.innerText = packName; // จะเป็น "Pack 1", "Pack 2" ตามที่คุณแก้ใน Col B
                btn.onclick = () => showPack(packName, index);
                menu.appendChild(btn);
            });
        }

        // 2. ฟังก์ชันแสดงข้อมูลในแต่ละ Pack
        function showPack(packName, index) {
            // จัดการสถานะปุ่ม Active
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            const activeBtn = document.getElementById(`btn-${index}`);
            if (activeBtn) activeBtn.classList.add('active-pack');

            const packInfo = MASTER_DATA[packName];
            document.getElementById('currentPackTitle').innerText = packName;
            
            // จัดการปุ่ม Playlist
            const pBtn = document.getElementById('playlistBtn');
            if (packInfo.playlistUrl) {
                pBtn.href = packInfo.playlistUrl;
                pBtn.style.display = 'flex';
            } else {
                pBtn.style.display = 'none';
            }

            // ล้างข้อมูลเก่าและสร้างรายการวิดีโอใหม่
            const videoList = document.getElementById('videoList');
            videoList.innerHTML = "";

            packInfo.videos.forEach(video => {
                const videoID = extractYoutubeID(video.url);
                const thumbUrl = videoID ? `https://img.youtube.com/vi/${videoID}/mqdefault.jpg` : 'https://via.placeholder.com/160x90';

                const card = `
                    <div class="video-card bg-white rounded-[2rem] shadow-sm border border-white p-4 flex gap-5 hover:shadow-md transition-all active:bg-gray-50" onclick="window.open('${video.url}', '_blank')">
                        <div class="relative flex-shrink-0 w-36 h-20 rounded-2xl overflow-hidden shadow-inner bg-gray-100">
                            <img src="${thumbUrl}" class="w-full h-full object-cover" alt="">
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10">
                                <div class="w-9 h-9 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-lg">
                                    <i class="fa-solid fa-play text-blue-600 text-xs ml-0.5"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center">
                            <h3 class="text-[17px] font-bold text-gray-800 leading-tight">
                                <span class="text-blue-600 mr-0.5">${video.no}.</span> ${video.title}
                            </h3>
                            <div class="flex items-center mt-2.5 text-[10px] font-bold text-gray-300 uppercase tracking-widest">
                                <i class="fa-brands fa-youtube text-red-500 mr-2 text-sm"></i> คลิกเพื่อรับชม
                            </div>
                        </div>
                    </div>
                `;
                videoList.innerHTML += card;
            });
        }

        // 3. ระบบสร้างข้อความ Template สำหรับส่งต่อ
        function generatePackTemplate(packName) {
            const packInfo = MASTER_DATA[packName];
            if (!packInfo) return "";

            let template = `${packName}\n--------------\n\n`;

            // ส่วนลิงก์ Playlist
            if (packInfo.playlistUrl) {
                template += `Playlist (${packName})\n${packInfo.playlistUrl}\n\n`;
            }

            // ส่วนรายการวิดีโอ (วนลูปตามข้อมูลใน Pack)
            packInfo.videos.forEach(video => {
                // รูปแบบ: [เลข] ([ชื่อ Pack]) : [ชื่อวิดีโอ] \n [URL]
                template += `${video.no} (${packName}) : ${video.title}\n${video.url}\n\n`;
            });

            return template.trim(); // ตัดช่องว่างส่วนเกินท้ายข้อความ
        }

        // 4. ฟังก์ชันคัดลอกลง Clipboard
        function copyCurrentLink() {
            const packName = document.getElementById('currentPackTitle').innerText;
            const textToCopy = generatePackTemplate(packName);

            navigator.clipboard.writeText(textToCopy).then(() => {
                alert(`คัดลอกข้อมูล ${packName} ลง Clipboard เรียบร้อยแล้ว!`);
            });
        }

        // 5. ฟังก์ชันแชร์ไปที่ LINE (Share Target Picker)
        async function shareToLine() {
            if (!liff.isApiAvailable('shareTargetPicker')) {
                alert("กรุณาเปิดฟีเจอร์ shareTargetPicker ใน LINE Console");
                return;
            }

            const packName = document.getElementById('currentPackTitle').innerText;
            const shareText = generatePackTemplate(packName);

            try {
                const result = await liff.shareTargetPicker([
                    {
                        "type": "text",
                        "text": shareText
                    }
                ]);
                if (result) {
                    console.log("แชร์สำเร็จ");
                }
            } catch (error) {
                console.error("Share failed:", error);
            }
        }

        // 6. แกะ YouTube ID เพื่อดึงรูปพรีวิว
        function extractYoutubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
