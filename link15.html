<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Pack System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .active-pack { background-color: #1e40af !important; color: white !important; transform: scale(1.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="loading" class="flex flex-col items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-slate-500">กำลังตรวจสอบสิทธิ์...</p>
    </div>

    <div id="mainUI" class="hidden">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md shadow-sm z-50 border-b border-slate-200">
            <div class="max-w-6xl mx-auto p-4 flex overflow-x-auto gap-3 hide-scrollbar" id="packMenu"></div>
        </div>
        <div class="max-w-6xl mx-auto p-6 space-y-8">
            <h2 id="currentPackTitle" class="text-3xl font-extrabold text-slate-900 italic">Buzz Pack</h2>
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>

    <script>
        let MASTER_DATA = {};

        async function init() {
            // เรียกใช้ระบบเช็คสิทธิ์ส่วนกลาง
            const auth = await checkAuth();
            if (auth) {
                MASTER_DATA = auth.data;
                renderMenu();
                showPack('P1');
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainUI').classList.remove('hidden');
            }
        }

        function renderMenu() {
            const menu = document.getElementById('packMenu');
            const keys = Object.keys(MASTER_DATA).sort((a,b) => parseInt(a.replace('P','')) - parseInt(b.replace('P','')));
            keys.forEach(id => {
                const btn = document.createElement('button');
                btn.id = `btn-${id}`;
                btn.className = "min-w-[55px] h-[55px] bg-white border rounded-2xl font-bold text-slate-600 flex-shrink-0 flex items-center justify-center transition-all shadow-sm";
                btn.innerText = id.replace('P', '');
                btn.onclick = () => showPack(id);
                menu.appendChild(btn);
            });
        }

        function showPack(id) {
            document.querySelectorAll('#packMenu button').forEach(b => b.classList.remove('active-pack'));
            document.getElementById(`btn-${id}`)?.classList.add('active-pack');
            document.getElementById('currentPackTitle').innerText = `Buzz Pack ${id.replace('P','')}`;
            
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = MASTER_DATA[id].videos.map(v => {
                const vid = v.url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([^#&?]*)/)?.[1];
                const thumb = vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : 'https://via.placeholder.com/480x360';
                return `
                    <a href="${v.url}" target="_blank" class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 block transition-transform hover:-translate-y-1">
                        <img src="${thumb}" class="w-full aspect-video object-cover">
                        <div class="p-4 font-semibold text-slate-700 text-sm">${v.title}</div>
                    </a>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
