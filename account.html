<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Premium Account</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --active-blue: #007bff; 
            --navy: #1a2a6c;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #d6e0f0 100%);
            min-height: 100vh; 
            font-family: 'Kanit', sans-serif; 
        }
        
        #loader {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #f3f3f3;
            border-top: 3px solid var(--navy); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .reg-card { 
            max-width: 500px; margin: 30px auto; background: var(--glass); 
            padding: 45px 35px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); display: none;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .profile-img {
            width: 90px; height: 90px; border-radius: 50%; 
            margin-bottom: 15px; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .header-title { color: var(--navy); font-weight: 600; font-size: 1.7rem; margin-bottom: 2px; }
        .sub-title { color: #888; font-size: 0.9rem; margin-bottom: 25px; font-weight: 300; }
        .user-id-text { font-size: 0.75rem; color: #cbd5e1; margin-bottom: 35px; }

        .form-label { font-weight: 500; color: #555; font-size: 0.85rem; margin-bottom: 8px; }
        .form-label i { color: var(--active-blue); width: 20px; text-align: center; margin-right: 4px; opacity: 0.8; }
        
        .form-control, .form-select { 
            border-radius: 14px; padding: 13px 18px; border: 1px solid #eef0f3; 
            font-size: 0.95rem; transition: 0.3s; background: #fcfdfe;
        }
        .form-control:focus, .form-select:focus { 
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1); border-color: var(--active-blue); background: #fff;
        }

        .readonly-input { background-color: #f8fafc !important; color: #94a3b8; cursor: not-allowed; }
        
        .btn-submit { 
            background: linear-gradient(135deg, var(--navy) 0%, #2a3d8f 100%);
            border: none; border-radius: 16px; 
            padding: 18px; font-weight: 500; color: white; width: 100%; margin-top: 30px;
            box-shadow: 0 10px 20px rgba(26, 42, 108, 0.2);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(26, 42, 108, 0.3); }
        .btn-submit:active { transform: scale(0.97); }

        /* Elegant Floating Alert */
        .swal2-popup.swal-luxury {
            width: 300px !important; border-radius: 25px !important; padding: 2rem 1.5rem !important;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15) !important;
        }
        .swal2-title { font-size: 1.2rem !important; color: var(--navy) !important; font-weight: 600 !important; }
        .swal2-loading { margin-top: 10px !important; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="container py-4">
        <div id="form-section" class="reg-card text-center">
            <h3 id="mainTitle" class="header-title">Registration</h3>
            <p class="sub-title">ลงทะเบียนสมาชิก Buzzolute LINE</p>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" style="font-weight: 600; color: var(--navy); font-size: 1.15rem;">-</div>
            <div id="userIdDisplay" class="user-id-text">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label"><i class="fa-regular fa-face-smile"></i> ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-6">
                        <label class="form-label"><i class="fa-solid fa-phone"></i> เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08x-xxx-xxxx" maxlength="12">
                    </div>
                    <div class="col-12">
                        <label class="form-label"><i class="fa-regular fa-address-card"></i> ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label"><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>

                    <div id="pinGroup" class="col-12" style="display:none;">
                        <label class="form-label text-primary"><i class="fa-solid fa-crown"></i> ระดับสมาชิก (PIN)</label>
                        <select id="pin" class="form-select" style="border-color: rgba(0, 123, 255, 0.3);">
                            <option value="General">General</option>
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                            <option value="Emerald">Emerald</option>
                            <option value="Diamond">Diamond</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label"><i class="fa-solid fa-map-location-dot"></i> จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" selected disabled>เลือกจังหวัด</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label"><i class="fa-solid fa-globe"></i> ประเทศ</label>
                        <input type="text" id="country" class="form-control readonly-input" value="ประเทศไทย" readonly>
                    </div>
                    <div class="col-12">
                        <label class="form-label"><i class="fa-solid fa-star"></i> Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum ในสายงาน">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        
        let isUpdateMode = false;
        let oldPin = "General";

        // Auto-hyphen phone number
        document.getElementById('phone').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 
                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || '';
                    document.getElementById('userIdDisplay').innerText = profile.userId;

                    const selectEl = document.getElementById('province');
                    provinces.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerText = p;
                        selectEl.appendChild(opt);
                    });
                    await fetchUserStatus(profile.userId);
                }
            } catch (err) { console.error(err); hideLoader(); }
        }

        async function fetchUserStatus(uID) {
            try {
                const response = await fetch(`${GAS_URL}?userId=${uID}&type=account`);
                const res = await response.json();
                if (res.status === "REGISTERED") {
                    isUpdateMode = true;
                    oldPin = res.data.pin || "General";
                    document.getElementById('mainTitle').innerText = "Account Profile";
                    document.getElementById('pinGroup').style.display = "block";
                    document.getElementById('nickname').value = res.data.nickname || "";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    let p = res.data.phone || "";
                    if(p.length === 10) document.getElementById('phone').value = p.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
                    document.getElementById('email').value = res.data.email || "";
                    document.getElementById('province').value = res.data.province || "";
                    document.getElementById('platinum').value = res.data.platinum || "";
                    document.getElementById('pin').value = oldPin;
                }
            } catch (e) { console.log("New User"); }
            finally { hideLoader(); }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
        }

        async function sendData() {
            const phoneRaw = document.getElementById('phone').value.replace(/-/g, '');
            const data = {
                nickname: document.getElementById('nickname').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: phoneRaw, 
                email: document.getElementById('email').value.trim(),
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value.trim(),
                pin: document.getElementById('pin').value
            };

            if (!data.fullName || data.phone.length < 10) {
                Swal.fire({ title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณากรอกชื่อและเบอร์โทรให้ถูกต้อง', icon: 'warning', customClass: { popup: 'swal-luxury' } });
                return;
            }

            let verifyCode = "";
            if (isUpdateMode && pinRank.indexOf(data.pin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({
                    title: 'ยืนยันการอัปเกรด',
                    input: 'text',
                    inputPlaceholder: 'ใส่รหัสยืนยัน...',
                    showCancelButton: true,
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' },
                    backdrop: `rgba(0,0,0,0.1)`
                });
                if (!code) return; 
                verifyCode = code;
            }

            Swal.fire({ 
                title: 'กำลังบันทึก...', 
                allowOutsideClick: false, 
                showConfirmButton: false,
                width: '280px',
                customClass: { popup: 'swal-luxury' },
                backdrop: `rgba(0,0,0,0.1)`,
                didOpen: () => Swal.showLoading() 
            });

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                verifyCode: verifyCode,
                ...data,
                country: "ประเทศไทย"
            };

            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.text();
                if (result === "Success" || result === "Updated") {
                    await Swal.fire({ icon: 'success', title: 'สำเร็จ!', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal-luxury' } });
                    liff.closeWindow();
                } else if (result === "InvalidCode") {
                    Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', customClass: { popup: 'swal-luxury' } });
                }
            } catch (err) {
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500, showConfirmButton: false });
                setTimeout(() => liff.closeWindow(), 1500);
            }
        }
        initLIFF();
    </script>
</body>
</html>
