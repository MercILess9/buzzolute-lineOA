<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --active-blue: #007bff; --navy: #1a2a6c; }
        body { background: #f4f7f6; min-height: 100vh; font-family: 'Kanit', sans-serif; }
        #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--active-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .reg-card { max-width: 450px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: none; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><p class="mt-3 text-secondary">กำลังโหลด...</p></div>

    <div class="container py-3">
        <div id="form-section" class="reg-card text-center">
            <h4 id="mainTitle" class="mb-4" style="color:var(--navy)">Register Member</h4>
            <img id="pictureUrlDisplay" class="rounded-circle mb-3 shadow-sm" style="width:80px; height:80px;">
            <div id="displayNameDisplay" class="fw-bold">-</div>
            
            <div class="text-start mt-4">
                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" class="form-control">
                </div>
                <div id="pinGroup" class="mb-3" style="display:none">
                    <label class="form-label text-primary">ระดับสมาชิก (PIN)</label>
                    <select id="pin" class="form-select">
                        <option value="General">General</option>
                        <option value="Silver">Silver</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                        <option value="Emerald">Emerald</option>
                        <option value="Diamond">Diamond</option>
                    </select>
                </div>
                <button onclick="sendData()" id="submitBtn" class="btn btn-primary w-100 py-3 mt-3 shadow">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        let isUpdateMode = false; let oldPin = "General"; let userProfile = {};

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                userProfile = await liff.getProfile();
                
                document.getElementById('displayNameDisplay').innerText = userProfile.displayName;
                document.getElementById('pictureUrlDisplay').src = userProfile.pictureUrl || '';
                
                await checkStatus(userProfile.userId);
            } catch (e) { console.error(e); hideLoader(); }
        }

        async function checkStatus(uID) {
            try {
                const res = await fetch(`${GAS_URL}?userId=${uID}&type=account`).then(r => r.json());
                if (res.status === "REGISTERED") {
                    isUpdateMode = true;
                    oldPin = res.data.pin || "General";
                    document.getElementById('mainTitle').innerText = "แก้ไขข้อมูลสมาชิก";
                    document.getElementById('submitBtn').innerText = "อัปเดตข้อมูล";
                    document.getElementById('pinGroup').style.display = "block";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    document.getElementById('phone').value = res.data.phone || "";
                    document.getElementById('pin').value = oldPin;
                }
            } catch (e) { console.log("New User"); }
            finally { hideLoader(); }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
        }

        async function sendData() {
            const newPin = document.getElementById('pin').value;
            let verifyCode = "";

            if (isUpdateMode && pinRank.indexOf(newPin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({ title: 'ใส่รหัสอัปเกรด', input: 'text', showCancelButton: true });
                if (!code) return;
                verifyCode = code;
            }

            Swal.showLoading();
            const payload = {
                userId: userProfile.userId,
                lineName: userProfile.displayName,
                pictureUrl: userProfile.pictureUrl,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                pin: newPin,
                verifyCode: verifyCode
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.text());
                if (res === "Success" || res === "Updated") {
                    await Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500 });
                    liff.closeWindow();
                } else if (res === "InvalidCode") {
                    Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง' });
                }
            } catch (e) { Swal.fire({ icon: 'success', title: 'สำเร็จ' }).then(() => liff.closeWindow()); }
        }
        init();
    </script>
</body>
</html>
