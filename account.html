<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --active-blue: #007bff; 
            --navy: #1a2a6c;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #d6e0f0 100%);
            min-height: 100vh; 
            font-family: 'Kanit', sans-serif; 
        }
        
        #loader {
            position: fixed; inset: 0; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #f3f3f3;
            border-top: 3px solid var(--navy); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .reg-card { 
            max-width: 480px; margin: 30px auto; background: var(--glass); 
            padding: 40px 35px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); display: none;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .profile-img {
            width: 85px; height: 85px; border-radius: 50%; 
            margin-bottom: 15px; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .header-title { color: var(--navy); font-weight: 600; font-size: 1.6rem; margin-bottom: 5px; }
        .user-id-text { font-size: 0.75rem; color: #b0b0b0; margin-bottom: 30px; letter-spacing: 0.5px; }

        .form-label { font-weight: 500; color: #666; font-size: 0.85rem; margin-bottom: 6px; padding-left: 2px; }
        .form-control, .form-select { 
            border-radius: 12px; padding: 12px 16px; border: 1px solid #e8e8e8; 
            font-size: 0.95rem; transition: 0.3s; background: #fcfcfc;
        }
        .form-control:focus, .form-select:focus { 
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.08); border-color: var(--active-blue); background: #fff;
        }

        .readonly-input { background-color: #f5f5f5 !important; color: #999; cursor: not-allowed; }
        
        .btn-submit { 
            background: var(--navy); border: none; border-radius: 15px; 
            padding: 16px; font-weight: 500; color: white; width: 100%; margin-top: 25px;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-submit:hover { background: #111d4a; transform: translateY(-1px); }
        .btn-submit:active { transform: scale(0.98); }

        /* Custom Small Floating Alert */
        .swal2-popup.swal-luxury {
            width: 280px !important; border-radius: 20px !important; padding: 1.5rem !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1) !important;
        }
        .swal2-title { font-size: 1.1rem !important; color: var(--navy) !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container py-4">
        <div id="form-section" class="reg-card text-center">
            <h3 id="mainTitle" class="header-title">Registration</h3>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" style="font-weight: 500; color: var(--navy); font-size: 1.1rem;">-</div>
            <div id="userIdDisplay" class="user-id-text">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-6">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08x-xxx-xxxx" maxlength="12">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>

                    <div id="pinGroup" class="col-12" style="display:none;">
                        <label class="form-label text-primary">ระดับสมาชิก (PIN)</label>
                        <select id="pin" class="form-select">
                            <option value="General">General</option>
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                            <option value="Emerald">Emerald</option>
                            <option value="Diamond">Diamond</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" selected disabled>เลือกจังหวัด</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">ประเทศ</label>
                        <input type="text" id="country" class="form-control readonly-input" value="ประเทศไทย" readonly>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียน</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        
        let isUpdateMode = false;
        let oldPin = "General";

        // Auto-format phone number 000-000-0000
        document.getElementById('phone').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 
                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || '';
                    document.getElementById('userIdDisplay').innerText = profile.userId; // ตัดคำว่า LINE ID: ออกแล้ว

                    const selectEl = document.getElementById('province');
                    provinces.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerText = p;
                        selectEl.appendChild(opt);
                    });
                    await fetchUserStatus(profile.userId);
                }
            } catch (err) { console.error(err); hideLoader(); }
        }

        async function fetchUserStatus(uID) {
            try {
                const response = await fetch(`${GAS_URL}?userId=${uID}&type=account`);
                const res = await response.json();
                if (res.status === "REGISTERED") {
                    isUpdateMode = true;
                    oldPin = res.data.pin || "General";
                    document.getElementById('mainTitle').innerText = "Account Profile";
                    document.getElementById('pinGroup').style.display = "block";
                    
                    document.getElementById('nickname').value = res.data.nickname || "";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    
                    // Format เบอร์โทรตอนดึงข้อมูลมาโชว์
                    let p = res.data.phone || "";
                    if(p.length === 10) document.getElementById('phone').value = p.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
                    
                    document.getElementById('email').value = res.data.email || "";
                    document.getElementById('province').value = res.data.province || "";
                    document.getElementById('platinum').value = res.data.platinum || "";
                    document.getElementById('pin').value = oldPin;
                }
            } catch (e) { console.log("New User"); }
            finally { hideLoader(); }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
        }

        async function sendData() {
            const phoneRaw = document.getElementById('phone').value.replace(/-/g, ''); // ตัดขีดออกก่อนส่ง
            const data = {
                nickname: document.getElementById('nickname').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: phoneRaw, 
                email: document.getElementById('email').value.trim(),
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value.trim(),
                pin: document.getElementById('pin').value
            };

            if (!data.fullName || data.phone.length < 10) {
                Swal.fire({ title: 'ข้อมูลไม่ถูกต้อง', text: 'กรุณากรอกข้อมูลให้ครบถ้วน', icon: 'warning', customClass: { popup: 'swal-luxury' } });
                return;
            }

            let verifyCode = "";
            if (isUpdateMode && pinRank.indexOf(data.pin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({
                    title: 'ยืนยันการอัปเกรด',
                    input: 'text',
                    inputPlaceholder: 'ใส่รหัสยืนยัน...',
                    showCancelButton: true,
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' },
                    backdrop: `rgba(0,0,0,0.15)`
                });
                if (!code) return; 
                verifyCode = code;
            }

            // Small Floating Loading
            Swal.fire({ 
                title: 'กำลังบันทึก', 
                allowOutsideClick: false, 
                showConfirmButton: false,
                width: '250px',
                customClass: { popup: 'swal-luxury' },
                backdrop: `rgba(0,0,0,0.1)`,
                didOpen: () => Swal.showLoading() 
            });

            try {
                const payload = {
                    userId: window.lineData.userId,
                    lineName: window.lineData.displayName,
                    pictureUrl: window.lineData.pictureUrl,
                    verifyCode: verifyCode,
                    ...data,
                    country: "ประเทศไทย"
                };

                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.text();

                if (result === "Success" || result === "Updated") {
                    await Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500, showConfirmButton: false, customClass: { popup: 'swal-luxury' } });
                    liff.closeWindow();
                } else if (result === "InvalidCode") {
                    Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', customClass: { popup: 'swal-luxury' } });
                }
            } catch (err) {
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500, showConfirmButton: false });
                setTimeout(() => liff.closeWindow(), 1500);
            }
        }
        initLIFF();
    </script>
</body>
</html>
