<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --active-blue: #007bff; --navy: #1a2a6c; }
        body { background: #f4f7f6; min-height: 100vh; font-family: 'Kanit', sans-serif; }
        
        /* Initial Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--active-blue); border-radius: 50%;
            animation: spin 0.6s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .reg-card { 
            max-width: 480px; margin: 20px auto; background: #ffffff; 
            padding: 40px 30px; border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); display: none;
        }
        .header-title { color: var(--navy); font-weight: 600; margin-bottom: 30px; }
        .form-label { font-weight: 500; color: #444; font-size: 0.9rem; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px 15px; border: 1px solid #e0e0e0; font-size: 1rem; }
        .readonly-input { background-color: #f9f9f9 !important; color: #888; cursor: not-allowed; }
        
        .btn-submit { 
            background: var(--active-blue); border: none; border-radius: 15px; 
            padding: 16px; font-weight: 600; color: white; width: 100%; margin-top: 25px;
            transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.98); }
        .swal-luxury { font-family: 'Kanit', sans-serif !important; border-radius: 25px !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h5 style="color:var(--navy); margin-bottom: 8px;">กำลังเชื่อมต่อระบบ LINE</h5>
        <p style="color:#aaa; font-weight: 300; font-size: 0.95rem;">โปรดรอสักครู่...</p>
    </div>

    <div class="container py-4">
        <div id="form-section" class="reg-card text-center">
            <h3 class="header-title">Register Buzzolute LINE</h3>
            <img id="pictureUrlDisplay" src="" style="width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div id="displayNameDisplay" style="font-weight: 500;">-</div>
            <div id="userIdDisplay" style="font-size: 0.7rem; color: #ccc; margin-bottom: 30px;">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-6">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>
                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" selected disabled>กรุณาเลือกจังหวัด</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">ประเทศ</label>
                        <input type="text" id="country" class="form-control readonly-input" value="ประเทศไทย" readonly>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum ในสายงาน">
                    </div>
                </div>
                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียนสมาชิก</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 
                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || '';
                    document.getElementById('userIdDisplay').innerText = profile.userId;
                    
                    const selectEl = document.getElementById('province');
                    provinces.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerHTML = p;
                        selectEl.appendChild(opt);
                    });

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('form-section').style.display = 'block';
                }
            } catch (err) { console.error(err); }
        }

        async function sendData() {
            const data = {
                nickname: document.getElementById('nickname').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value.trim()
            };

            // ตรวจสอบข้อมูลว่าง
            if (Object.values(data).some(v => !v)) {
                Swal.fire({ 
                    title: 'ข้อมูลไม่ครบ', 
                    text: 'กรุณากรอกข้อมูลให้ครบทุกช่อง', 
                    icon: 'warning', 
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' } 
                });
                return;
            }

            // --- 🚀 เริ่มต้น Loading กลางจอแบบใหม่ ---
            Swal.fire({
                title: 'กำลังลงทะเบียน',
                text: 'โปรดรอสักครู่ ระบบกำลังบันทึกข้อมูล...',
                allowOutsideClick: false,
                showConfirmButton: false,
                customClass: { popup: 'swal-luxury' },
                didOpen: () => {
                    Swal.showLoading(); // แสดงตัวหมุนกลางจอ
                }
            });

            try {
                const payload = {
                    method: 'register',
                    userId: window.lineData.userId,
                    lineName: window.lineData.displayName,
                    pictureUrl: window.lineData.pictureUrl,
                    ...data,
                    country: "ประเทศไทย"
                };

                // ส่งข้อมูลไป GAS
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                // เมื่อสำเร็จ ให้เปลี่ยน Loading เป็นเครื่องหมายถูก
                Swal.fire({ 
                    title: 'ลงทะเบียนสำเร็จ', 
                    icon: 'success', 
                    showConfirmButton: false, 
                    timer: 2000,
                    timerProgressBar: true,
                    customClass: { popup: 'swal-luxury' } 
                }).then(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const target = urlParams.get('target');
                    if (target) { 
                        window.location.href = decodeURIComponent(target); 
                    } else { 
                        liff.closeWindow(); 
                    }
                });
            } catch (err) {
                // กรณี Error ให้แจ้งเตือน
                Swal.fire({ 
                    title: 'เกิดข้อผิดพลาด', 
                    text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่', 
                    icon: 'error',
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' }
                });
            }
        }
        initLIFF();
    </script>
</body>
</html>
