<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Account Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --active-blue: #007bff; --navy: #1a2a6c; }
        body { background: #f4f7f6; min-height: 100vh; font-family: 'Kanit', sans-serif; }
        
        /* สไตล์หน้าจอ Loading */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--active-blue); border-radius: 50%;
            animation: spin 0.6s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .reg-card { 
            max-width: 480px; margin: 20px auto; background: #ffffff; 
            padding: 40px 30px; border-radius: 25px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); display: none;
        }
        .header-title { color: var(--navy); font-weight: 600; margin-bottom: 30px; }
        .form-label { font-weight: 500; color: #444; font-size: 0.9rem; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px 15px; border: 1px solid #e0e0e0; font-size: 1rem; }
        
        .btn-submit { 
            background: var(--active-blue); border: none; border-radius: 15px; 
            padding: 16px; font-weight: 600; color: white; width: 100%; margin-top: 25px;
            transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.98); }
        .swal-luxury { font-family: 'Kanit', sans-serif !important; border-radius: 25px !important; }
        .badge-status { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; background: #eef2ff; color: #4338ca; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h5 style="color:var(--navy); margin-bottom: 8px;">กำลังเข้าสู่ระบบ</h5>
        <p style="color:#aaa; font-weight: 300; font-size: 0.95rem;">ตรวจสอบสถานะสมาชิกจากฐานข้อมูล...</p>
    </div>

    <div class="container py-4">
        <div id="form-section" class="reg-card text-center">
            <div id="statusBadge" class="badge-status" style="display:none;">สมาชิกปัจจุบัน</div>
            <h3 id="mainTitle" class="header-title">Register Buzzolute</h3>
            
            <img id="pictureUrlDisplay" src="" style="width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid #fff;">
            <div id="displayNameDisplay" style="font-weight: 500;">-</div>
            <div id="userIdDisplay" style="font-size: 0.7rem; color: #ccc; margin-bottom: 25px;">-</div>

            <div class="text-start">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label">ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ระบุชื่อเล่น">
                    </div>
                    <div class="col-6">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    
                    <div id="pinGroup" class="col-12" style="display:none;">
                        <label class="form-label">ระดับสมาชิก (PIN)</label>
                        <select id="pin" class="form-select">
                            <option value="General">General</option>
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                            <option value="Emerald">Emerald</option>
                            <option value="Diamond">Diamond</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" disabled selected>เลือกจังหวัด</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">ลงทะเบียนสมาชิก</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        
        let isUpdateMode = false;
        let oldPin = "General";

        async function initLIFF() {
            try {
                // ตรวจสอบว่ามีตัวแปรจาก config.js ไหม
                if (typeof LIFF_ID === 'undefined') {
                    alert("หา LIFF_ID ไม่เจอ! ตรวจสอบ config.js");
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 
                    
                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || '';
                    document.getElementById('userIdDisplay').innerText = profile.userId;

                    const selectEl = document.getElementById('province');
                    provinces.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerHTML = p;
                        selectEl.appendChild(opt);
                    });

                    // ไปดึงข้อมูลจาก GAS
                    await checkUserStatus(profile.userId);
                }
            } catch (err) {
                console.error("LIFF Error:", err);
                document.getElementById('loader').style.display = 'none'; // ถ้าพังก็ต้องปิด loader
            }
        }

        async function checkUserStatus(uID) {
            try {
                // ดึงข้อมูลสมาชิก (ส่ง type=account ไปให้ GAS)
                const response = await fetch(`${GAS_URL}?userId=${uID}&type=account`);
                const res = await response.json();

                if (res.status === "REGISTERED") {
                    isUpdateMode = true;
                    oldPin = res.data.pin || "General";
                    
                    // เปลี่ยน UI เป็นโหมดแก้ไข
                    document.getElementById('mainTitle').innerText = "Account Profile";
                    document.getElementById('submitBtn').innerText = "อัปเดตข้อมูล";
                    document.getElementById('statusBadge').style.display = "inline-block";
                    document.getElementById('pinGroup').style.display = "block";
                    
                    // เติมข้อมูลเดิมเข้าช่อง input
                    document.getElementById('fullName').value = res.data.fullName || "";
                    document.getElementById('phone').value = res.data.phone || "";
                    document.getElementById('nickname').value = res.data.nickname || "";
                    document.getElementById('pin').value = oldPin;
                    if(res.data.province) document.getElementById('province').value = res.data.province;
                }
            } catch (e) {
                console.log("New User Mode");
            } finally {
                // --- 🔒 หัวใจสำคัญ: ไม่ว่าจะโหลดสำเร็จหรือ Error ต้องปิดหน้าหมุนตรงนี้ ---
                document.getElementById('loader').style.display = 'none';
                document.getElementById('form-section').style.display = 'block';
            }
        }

        async function sendData() {
            const newPin = document.getElementById('pin').value;
            const data = {
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                nickname: document.getElementById('nickname').value.trim(),
                province: document.getElementById('province').value,
                pin: newPin
            };

            if (!data.fullName || !data.phone) {
                Swal.fire({ title: 'ข้อมูลไม่ครบ', icon: 'warning', customClass: { popup: 'swal-luxury' } });
                return;
            }

            let verifyCode = "";
            // ถ้าเลื่อนตำแหน่งสูงขึ้น ให้ถาม Code
            if (isUpdateMode && pinRank.indexOf(newPin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({
                    title: 'ยืนยันการอัปเกรด',
                    text: `ใส่รหัสเพื่อเปลี่ยนระดับเป็น ${newPin}`,
                    input: 'text',
                    showCancelButton: true,
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' }
                });
                if (!code) return; 
                verifyCode = code;
            }

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                verifyCode: verifyCode,
                ...data
            };

            try {
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await response.text();

                if (result === "Success" || result === "Updated") {
                    await Swal.fire({ title: 'สำเร็จ!', icon: 'success', timer: 2000, showConfirmButton: false });
                    liff.closeWindow();
                } else if (result === "InvalidCode") {
                    Swal.fire({ title: 'รหัสไม่ถูกต้อง', text: 'กรุณาตรวจสอบรหัสอีกครั้ง', icon: 'error' });
                } else {
                    // กรณี GAS ไม่ตอบ Success แต่ทำงานสำเร็จ (เช่นติด CORS)
                    await Swal.fire({ title: 'เรียบร้อย', icon: 'success', timer: 1500 });
                    liff.closeWindow();
                }
            } catch (err) {
                Swal.fire({ title: 'สำเร็จ', icon: 'success', timer: 1500 }).then(() => liff.closeWindow());
            }
        }

        initLIFF();
    </script>
</body>
</html>
