<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzolute Premium Account</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --active-blue: #007bff; 
            --navy: #1a2a6c;
            --soft-bg: #f8fafe;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh; 
            font-family: 'Kanit', sans-serif; 
            color: #333;
        }
        
        /* Premium Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-white); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 60px; height: 60px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--navy); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Luxury Card */
        .reg-card { 
            max-width: 520px; margin: 40px auto; background: var(--glass-white); 
            padding: 50px 40px; border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); display: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .profile-img {
            width: 100px; height: 100px; border-radius: 50%; 
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 4px solid #fff; transition: 0.3s;
        }

        .header-title { color: var(--navy); font-weight: 600; font-size: 1.8rem; margin-bottom: 10px; }
        .sub-title { color: #888; font-size: 0.9rem; margin-bottom: 35px; }

        .section-label {
            font-size: 0.85rem; font-weight: 600; color: var(--navy);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; display: block; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px;
        }

        .form-label { font-weight: 500; color: #555; font-size: 0.85rem; margin-bottom: 6px; margin-left: 4px;}
        
        .form-control, .form-select { 
            border-radius: 15px; padding: 14px 18px; border: 1px solid #e2e8f0; 
            font-size: 0.95rem; background-color: #fdfdfd; transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus { 
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1); border-color: var(--active-blue);
            background-color: #fff;
        }

        .readonly-input { background-color: #f1f5f9 !important; color: #64748b; cursor: not-allowed; border-color: #e2e8f0; }
        
        .btn-submit { 
            background: linear-gradient(to right, var(--navy), var(--active-blue));
            border: none; border-radius: 18px; 
            padding: 18px; font-weight: 600; color: white; width: 100%; margin-top: 30px;
            box-shadow: 0 10px 25px rgba(26, 42, 108, 0.3);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(26, 42, 108, 0.4); }
        .btn-submit:active { transform: scale(0.96); }

        .swal-luxury { font-family: 'Kanit', sans-serif !important; border-radius: 25px !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h5 style="color:var(--navy); margin-bottom: 8px;">Buzzolute Authentication</h5>
        <p style="color:#aaa; font-weight: 300; font-size: 0.95rem;">Securing your connection...</p>
    </div>

    <div class="container py-4">
        <div id="form-section" class="reg-card text-center">
            <h3 id="mainTitle" class="header-title">Registration</h3>
            <p class="sub-title">ลงทะเบียนสมาชิก Buzzolute LINE</p>
            
            <img id="pictureUrlDisplay" src="" class="profile-img">
            <div id="displayNameDisplay" style="font-weight: 600; color: var(--navy);">LINE Name</div>
            <div id="userIdDisplay" style="font-size: 0.75rem; color: #cbd5e1; margin-bottom: 40px;">LINE ID: -</div>

            <div class="text-start">
                <span class="section-label">ข้อมูลส่วนตัว</span>
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label"><i class="fa-regular fa-user me-1"></i> ชื่อเล่น</label>
                        <input type="text" id="nickname" class="form-control" placeholder="ชื่อเล่น">
                    </div>
                    <div class="col-6">
                        <label class="form-label"><i class="fa-solid fa-phone me-1"></i> เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                    <div class="col-12">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullName" class="form-control" placeholder="ระบุชื่อจริง-นามสกุล">
                    </div>
                    <div class="col-12">
                        <label class="form-label"><i class="fa-regular fa-envelope me-1"></i> Email</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>
                </div>

                <span class="section-label">ข้อมูลการทำงานและที่อยู่</span>
                <div class="row g-3">
                    <div id="pinGroup" class="col-12" style="display:none;">
                        <label class="form-label text-primary font-bold">ระดับสมาชิก (PIN)</label>
                        <select id="pin" class="form-select" style="border: 2px solid rgba(0, 123, 255, 0.2);">
                            <option value="General">General</option>
                            <option value="Silver">Silver</option>
                            <option value="Gold">Gold</option>
                            <option value="Platinum">Platinum</option>
                            <option value="Emerald">Emerald</option>
                            <option value="Diamond">Diamond</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">จังหวัด</label>
                        <select id="province" class="form-select">
                            <option value="" selected disabled>กรุณาเลือกจังหวัด</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">ประเทศ</label>
                        <input type="text" id="country" class="form-control readonly-input" value="ประเทศไทย" readonly>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Platinum ในสายงาน</label>
                        <input type="text" id="platinum" class="form-control" placeholder="ระบุชื่อ Platinum ของคุณ">
                    </div>
                </div>

                <button onclick="sendData()" id="submitBtn" class="btn btn-submit">
                    ลงทะเบียนเข้าสู่ระบบ
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const provinces = ["กรุงเทพมหานคร", "กระบี่", "กาญจนบุรี", "กาฬสินธุ์", "กำแพงเพชร", "ขอนแก่น", "จันทบุรี", "ฉะเชิงเทรา", "ชลบุรี", "ชัยนาท", "ชัยภูมิ", "ชุมพร", "เชียงราย", "เชียงใหม่", "ตรัง", "ตราด", "ตาก", "นครนายก", "นครปฐม", "นครพนม", "นครราชสีมา", "นครศรีธรรมราช", "นครสวรรค์", "นนทบุรี", "นราธิวาส", "น่าน", "บึงกาฬ", "บุรีรัมย์", "ปทุมธานี", "ประจวบคีรีขันธ์", "ปราจีนบุรี", "ปัตตานี", "พระนครศรีอยุธยา", "พะเยา", "พังงา", "พัทลุง", "พิจิตร", "พิษณุโลก", "เพชรบุรี", "เพชรบูรณ์", "แพร่", "ภูเก็ต", "มหาสารคาม", "มุกดาหาร", "แม่ฮ่องสอน", "ยโสธร", "ยะลา", "ร้อยเอ็ด", "ระนอง", "ระยอง", "ราชบุรี", "ลพบุรี", "ลำปาง", "ลำพูน", "เลย", "ศรีสะเกษ", "สกลนคร", "สงขลา", "สตูล", "สมุทรปราการ", "สมุทรสงคราม", "สมุทรสาคร", "สระแก้ว", "สระบุรี", "สิงห์บุรี", "สุโขทัย", "สุพรรณบุรี", "สุราษฎร์ธานี", "สุรินทร์", "หนองคาย", "หนองบัวลำภู", "อ่างทอง", "อำนาจเจริญ", "อุดรธานี", "อุตรดิตถ์", "อุทัยธานี", "อุบลราชธานี"];
        const pinRank = ["General", "Silver", "Gold", "Platinum", "Emerald", "Diamond"];
        
        let isUpdateMode = false;
        let oldPin = "General";

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); } else {
                    const profile = await liff.getProfile();
                    window.lineData = profile; 
                    
                    document.getElementById('displayNameDisplay').innerText = profile.displayName;
                    document.getElementById('pictureUrlDisplay').src = profile.pictureUrl || '';
                    document.getElementById('userIdDisplay').innerText = `LINE ID: ${profile.userId}`;

                    const selectEl = document.getElementById('province');
                    provinces.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerHTML = p;
                        selectEl.appendChild(opt);
                    });

                    await fetchUserStatus(profile.userId);
                }
            } catch (err) { console.error(err); hideLoader(); }
        }

        async function fetchUserStatus(uID) {
            try {
                const response = await fetch(`${GAS_URL}?userId=${uID}&type=account`);
                const res = await response.json();

                if (res.status === "REGISTERED") {
                    isUpdateMode = true;
                    oldPin = res.data.pin || "General";
                    
                    document.getElementById('mainTitle').innerText = "Account Profile";
                    document.getElementById('submitBtn').innerText = "อัปเดตข้อมูลสมาชิก";
                    document.getElementById('pinGroup').style.display = "block";
                    
                    // บรรจุข้อมูลเดิมลงในฟอร์ม (ครบทุกฟิลด์ตามที่คุณแจ้ง)
                    document.getElementById('nickname').value = res.data.nickname || "";
                    document.getElementById('fullName').value = res.data.fullName || "";
                    document.getElementById('phone').value = res.data.phone || "";
                    document.getElementById('email').value = res.data.email || "";
                    document.getElementById('province').value = res.data.province || "";
                    document.getElementById('platinum').value = res.data.platinum || "";
                    document.getElementById('pin').value = oldPin;
                }
            } catch (e) { console.log("New User Mode"); }
            finally { hideLoader(); }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
        }

        async function sendData() {
            const newPin = document.getElementById('pin').value;
            const data = {
                nickname: document.getElementById('nickname').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                province: document.getElementById('province').value,
                platinum: document.getElementById('platinum').value.trim(),
                pin: newPin
            };

            if (!data.fullName || !data.phone) {
                Swal.fire({ title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกชื่อ-นามสกุล และเบอร์โทรศัพท์', icon: 'warning', customClass: { popup: 'swal-luxury' } });
                return;
            }

            let verifyCode = "";
            if (isUpdateMode && pinRank.indexOf(newPin) > pinRank.indexOf(oldPin)) {
                const { value: code } = await Swal.fire({
                    title: 'ยืนยันการอัปเกรด PIN',
                    text: `ระดับปัจจุบันของคุณคือ ${oldPin} กำลังเปลี่ยนเป็น ${newPin}`,
                    input: 'text',
                    inputPlaceholder: 'ใส่รหัสยืนยัน...',
                    showCancelButton: true,
                    confirmButtonColor: '#1a2a6c',
                    customClass: { popup: 'swal-luxury' }
                });
                if (!code) return; 
                verifyCode = code;
            }

            Swal.fire({ 
                title: 'Saving Information', 
                text: 'กำลังบันทึกข้อมูลเข้าสู่ระบบ...',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            const payload = {
                userId: window.lineData.userId,
                lineName: window.lineData.displayName,
                pictureUrl: window.lineData.pictureUrl,
                verifyCode: verifyCode,
                ...data,
                country: "ประเทศไทย"
            };

            try {
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await response.text();

                if (result === "Success" || result === "Updated") {
                    await Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: 'บันทึกข้อมูลเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                    liff.closeWindow();
                } else if (result === "InvalidCode") {
                    Swal.fire({ icon: 'error', title: 'รหัสไม่ถูกต้อง', text: 'กรุณาตรวจสอบรหัสอัปเกรดอีกครั้ง', icon: 'error' });
                } else {
                    await Swal.fire({ icon: 'success', title: 'เรียบร้อย', timer: 1500 });
                    liff.closeWindow();
                }
            } catch (err) {
                Swal.fire({ title: 'สำเร็จ', icon: 'success', timer: 1500 }).then(() => liff.closeWindow());
            }
        }
        initLIFF();
    </script>
</body>
</html>
